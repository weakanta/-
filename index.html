<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>コトバ・サバイバル Pro v12</title>
    <style>
        :root { --main: #4a90e2; --sub: #2ed573; --danger: #ff4757; --bg: #f4f7f9; }
        body { background: var(--bg); font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; text-align: center; color: #333; overflow-x: hidden; }
        .panel { background: white; padding: 20px; border-radius: 20px; width: 94%; max-width: 500px; margin: 15px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.05); box-sizing: border-box; }
        .screen { display: none; }
        .active { display: block; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; width: 80%; margin: 5px 0; }
        .btn { padding: 14px 24px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--main); color: white; }
        .btn-host { background: orange; color: white; width: 100%; margin-top: 15px; font-size: 1.1rem; }
        .color-picker { display: flex; justify-content: center; gap: 10px; margin: 10px 0; padding: 10px; background: #eee; border-radius: 12px; }
        .color-dot { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.2s; position: relative; }
        .color-dot.selected { border-color: #333; transform: scale(1.1); }
        .color-dot.taken { opacity: 0.2; cursor: not-allowed; pointer-events: none; }
        .color-dot.taken::after { content: "×"; color: white; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; }
        .kb-container { background: #e2e8f0; padding: 6px; border-radius: 12px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
        .key { aspect-ratio: 1.2; background: white; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; cursor: pointer; box-shadow: 0 2px 0 #cbd5e0; }
        .key.my-correct { background: var(--sub) !important; color: white; }
        .key.others-correct { color: white; position: relative; }
        .key.wrong-all { background: var(--danger) !important; color: white; }
        .key.removed { background: #cbd5e0 !important; opacity: 0.3; pointer-events: none; }
        .key-group-label { grid-column: span 5; font-size: 0.65rem; color: #718096; text-align: left; padding: 4px 2px 0; }
        #turn-msg { padding: 12px; border-radius: 15px; margin-bottom: 10px; font-weight: bold; border: 4px solid #ddd; background: white; }
        #wrong-toast { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0); background: rgba(0,0,0,0.85); color: white; padding: 20px 30px; border-radius: 15px; z-index: 9999; transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); font-size: 1.5rem; }
        #wrong-toast.show { transform: translate(-50%, -50%) scale(1); }
        .slot { width: 26px; height: 36px; border-bottom: 3px solid #ccc; font-size: 1.2rem; font-weight: bold; display: flex; align-items: center; justify-content: center; margin: 2px; }
        .host-only { display: none; }
        .rank-row { border-bottom: 1px solid #eee; padding: 10px 0; }
        .rank-main { display: flex; justify-content: space-between; font-weight: bold; }
        .rank-sub { font-size: 0.75rem; text-align: left; color: #666; margin-top: 4px; }
    </style>
</head>
