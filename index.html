<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>コトバ・サバイバル Pro v15</title>
    <style>
        :root { --main: #4a90e2; --sub: #2ed573; --danger: #ff4757; --bg: #f4f7f9; }
        body { background: var(--bg); font-family: sans-serif; margin: 0; text-align: center; color: #333; height: 100vh; display: flex; flex-direction: column; }
        .panel { background: white; padding: 15px; border-radius: 15px; width: 96%; max-width: 500px; margin: 10px auto; box-shadow: 0 5px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
        .screen { display: none; flex: 1; flex-direction: column; overflow-y: auto; }
        .active { display: flex; }
        
        /* コンパクトキーボード */
        .kb-container { background: #e2e8f0; padding: 4px; border-radius: 10px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; }
        .key { aspect-ratio: 1; background: white; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; cursor: pointer; box-shadow: 0 1px 0 #cbd5e0; }
        .key.my-correct { background: var(--sub) !important; color: white; }
        .key.wrong-all { background: var(--danger) !important; color: white; }
        .key.removed { background: #cbd5e0 !important; opacity: 0.3; pointer-events: none; }
        .key-group-label { grid-column: span 6; font-size: 0.6rem; color: #718096; text-align: left; padding: 2px; background: #cbd5e0; margin: 2px 0; border-radius: 2px; }

        /* 進捗状況パネル */
        .progress-container { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-bottom: 10px; font-size: 0.7rem; }
        .p-box { background: #eee; padding: 5px; border-radius: 8px; border-left: 4px solid #ccc; min-width: 80px; }
        .p-slots { display: flex; gap: 2px; margin-top: 3px; justify-content: center; }
        .p-dot { width: 8px; height: 8px; background: #ddd; border-radius: 1px; }
        .p-dot.filled { background: var(--sub); }

        /* チャット機能 */
        .chat-area { border-top: 1px solid #ddd; background: white; padding: 5px; display: flex; flex-direction: column; height: 120px; }
        #chat-logs { flex: 1; overflow-y: auto; text-align: left; font-size: 0.75rem; padding: 5px; }
        .chat-input-row { display: flex; gap: 5px; }
        #chat-input { flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #ddd; font-size: 14px; }
        
        .slot { width: 22px; height: 30px; border-bottom: 2px solid #ccc; font-size: 1rem; display: flex; align-items: center; justify-content: center; margin: 1px; }
        .btn { padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-primary { background: var(--main); color: white; }
        #stamp-popup { position: fixed; top: 20%; left: 50%; transform: translate(-50%, -50%) scale(0); background: white; padding: 10px; border-radius: 20px; border: 2px solid var(--main); z-index: 10000; transition: 0.3s; pointer-events: none; }
        #stamp-popup.show { transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>

    <div id="stamp-popup"></div>

    <div id="screen-entry" class="screen active">
        <div class="panel">
            <h2 style="color:var(--main); margin:0 0 15px 0;">コトバ・サバイバル</h2>
            <input type="text" id="input-name" placeholder="なまえ" value="プレイヤー"><br>
            <input type="text" id="input-room" placeholder="部屋ID" value="123"><br>
            <div style="margin-top:10px; display:flex; gap:10px;">
                <button id="btn-create" class="btn btn-primary" style="flex:1">作成</button>
                <button id="btn-join" class="btn btn-primary" style="flex:1; background:var(--sub)">参加</button>
            </div>
        </div>
    </div>

    <div id="screen-lobby" class="screen">
        <div class="panel">
            <h3>待機中...</h3>
            <div id="lobby-members" style="font-size:0.9rem; margin-bottom:10px;"></div>
            <div class="host-only" style="display:none; border-top:1px solid #eee; padding-top:10px;">
                ジャンル: <select id="select-g"></select><br>
                ライフ: <input type="number" id="select-h" value="17" style="width:50px;"><br>
                <button id="btn-start" class="btn btn-primary" style="width:100%; margin-top:10px; background:orange;">開始！</button>
            </div>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="panel" style="padding:10px; margin-bottom:5px;">
            <div id="turn-msg" style="font-size:0.8rem; font-weight:bold;">読み込み中...</div>
            <div id="word-display" style="display:flex; justify-content:center; flex-wrap:wrap; margin:10px 0;"></div>
            
            <div id="progress-list" class="progress-container"></div>
            
            <div id="heart-status" style="font-size:0.8rem;">❤️ <span id="heart-count"></span></div>
        </div>

        <div id="keyboard" class="kb-container" style="margin:0 auto; width:96%;"></div>

        <div class="stamp-bar" style="display:flex; justify-content:center; gap:10px; padding:5px;">
            <span onclick="sendStamp('👏')" style="cursor:pointer">👏</span>
            <span onclick="sendStamp('👍')" style="cursor:pointer">👍</span>
            <span onclick="sendStamp('😮')" style="cursor:pointer">😮</span>
            <span onclick="sendStamp('😭')" style="cursor:pointer">😭</span>
        </div>

        <div class="chat-area">
            <div id="chat-logs"></div>
            <div class="chat-input-row">
                <input type="text" id="chat-input" placeholder="メッセージ...">
                <button onclick="sendChat()" class="btn btn-primary" style="padding:5px 15px;">送る</button>
            </div>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <div class="panel">
            <h1 id="res-status">RESULT</h1>
            <h3 id="res-word" style="color:var(--main)"></h3>
            <div id="res-ranking"></div>
            <button onclick="location.reload()" class="btn btn-primary" style="width:100%; margin-top:20px;">戻る</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, onDisconnect, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { dictionary } from "./questions.js";

        const selectG = document.getElementById('select-g');
        Object.keys(dictionary).forEach(genre => {
            const opt = document.createElement('option');
            opt.value = genre; opt.innerText = genre; selectG.appendChild(opt);
        });

        const firebaseConfig = {
            apiKey: "AIzaSyAWddxiv4O3gJW2Fyf2gGEwWs5dCiWuu7Y",
            authDomain: "airhockey-1e251.firebaseapp.app",
            projectId: "airhockey-1e251",
            databaseURL: "https://airhockey-1e251-default-rtdb.asia-southeast1.firebasedatabase.app",
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let audioCtx;
        function playTone(f, d, t="sine") {
            try {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.type = t; o.frequency.value = f; g.gain.setValueAtTime(0.05, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
                o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
            } catch(e) {}
        }

        const kanaGroups = [
            { label: "あ-な", chars: "あいうえおかきくけこさしすせそたちつてとなにぬねの" },
            { label: "は-わ", chars: "はひふへほまみむめもやゆよらりるれろわをんー" },
            { label: "濁音・小", chars: "がぎぐげござじずぜぞだぢづでどばびぶべぼぱぴぷぺぽゃゅょっぁぃぅぇぉゔ" }
        ];

        let myId, myName, roomKey, isHost = false, myHearts = 17, myGuessed = [], currentData = null;
        let lastTurnId = "", lastStatus = "entry", lastStampTime = 0;

        const entry = (host) => {
            isHost = host; myName = document.getElementById('input-name').value || "ななし";
            roomKey = "room_" + (document.getElementById('input-room').value || "123");
            myId = Math.random().toString(36).slice(2, 7);
            showScreen('screen-lobby');
            if(host) document.querySelectorAll('.host-only').forEach(e => e.style.display = 'block');
            
            const roomRef = ref(db, `rooms/${roomKey}`);
            const pRef = ref(db, `rooms/${roomKey}/players/${myId}`);
            if(host) set(roomRef, { status: "lobby", config: { g: Object.keys(dictionary)[0], h: 17 } });
            
            set(pRef, { name: myName, score: 0, guessedStr: "", color: "#4a90e2" });
            onDisconnect(pRef).remove();

            onValue(roomRef, (snap) => {
                const data = snap.val(); if(!data) return;
                currentData = data;
                const players = Object.entries(data.players || {}).map(([id, p]) => ({id, ...p}));
                document.getElementById('lobby-members').innerText = "参加中: " + players.map(p => p.name).join(", ");
                
                if(data.status === "playing") {
                    if(data.lastStamp?.time > lastStampTime) { lastStampTime = data.lastStamp.time; showStampPopup(data.lastStamp); }
                    const curP = players[data.turnIdx];
                    if(curP?.id !== lastTurnId) { lastTurnId = curP?.id; if(lastTurnId === myId) playTone(440, 0.05, "triangle"); }
                }

                if(data.status !== lastStatus) {
                    lastStatus = data.status;
                    if(data.status === "playing") initGame(data);
                    else if(data.status === "finished") showResult(data, players);
                    else if(data.status === "lobby") showScreen('screen-lobby');
                } else if(data.status === "playing") renderUI(data);
            });

            // チャット購読
            onValue(ref(db, `rooms/${roomKey}/chats`), (snap) => {
                const logs = document.getElementById('chat-logs');
                logs.innerHTML = "";
                const chats = snap.val();
                if(chats) {
                    Object.values(chats).slice(-15).forEach(c => {
                        const div = document.createElement('div');
                        div.innerHTML = `<b>${c.sender}:</b> ${c.msg}`;
                        logs.appendChild(div);
                    });
                    logs.scrollTop = logs.scrollHeight;
                }
            });
        };

        window.sendChat = () => {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            push(ref(db, `rooms/${roomKey}/chats`), { sender: myName, msg: input.value, time: Date.now() });
            input.value = "";
        };

        window.sendStamp = (emoji) => {
            update(ref(db, `rooms/${roomKey}`), { lastStamp: { emoji, sender: myName, time: Date.now() } });
        };

        function showStampPopup(s) {
            const p = document.getElementById('stamp-popup');
            p.innerText = `${s.sender}: ${s.emoji}`; p.classList.add('show');
            playTone(600, 0.1);
            setTimeout(() => p.classList.remove('show'), 1500);
        }

        document.getElementById('btn-create').onclick = () => entry(true);
        document.getElementById('btn-join').onclick = () => entry(false);
        document.getElementById('btn-start').onclick = () => {
            const genre = document.getElementById('select-g').value;
            const targetList = dictionary[genre];
            const target = targetList[Math.floor(Math.random() * targetList.length)];
            const allChars = kanaGroups.map(g => g.chars).join("").split("");
            const removed = allChars.filter(c => !target.includes(c)).sort(() => Math.random() - 0.5).slice(0, 8);
            update(ref(db, `rooms/${roomKey}`), { 
                status: "playing", target, turnIdx: 0, wrongAll: [], 
                config: { g: genre, h: parseInt(document.getElementById('select-h').value), removed } 
            });
        };

        function initGame(data) {
            myGuessed = []; myHearts = data.config.h; showScreen('screen-game');
            const kb = document.getElementById('keyboard'); kb.innerHTML = "";
            kanaGroups.forEach(group => {
                const label = document.createElement("div"); label.className = "key-group-label"; label.innerText = group.label;
                kb.appendChild(label);
                group.chars.split("").forEach(c => {
                    const k = document.createElement("div"); k.className = "key"; k.id = "k-" + c; k.innerText = c;
                    if(data.config.removed?.includes(c)) k.classList.add("removed");
                    k.onclick = () => handleGuess(c); kb.appendChild(k);
                });
            });
        }

        function handleGuess(char) {
            const pList = Object.entries(currentData.players).map(([id, p]) => ({id, ...p}));
            if(pList[currentData.turnIdx].id !== myId) return;
            const btn = document.getElementById("k-"+char);
            if(btn.classList.contains('wrong-all') || btn.classList.contains('my-correct')) return;
            
            if(currentData.target.includes(char)) {
                myGuessed.push(char); playTone(880, 0.1);
                update(ref(db, `rooms/${roomKey}/players/${myId}`), { score: myGuessed.length, guessedStr: myGuessed.join(",") });
            } else {
                myHearts--; const wa = currentData.wrongAll || []; wa.push(char);
                update(ref(db, `rooms/${roomKey}`), { wrongAll: wa, lastWrong: { char, time: Date.now() } });
            }
            update(ref(db, `rooms/${roomKey}`), { turnIdx: (currentData.turnIdx + 1) % pList.length });
            if(currentData.target.split("").every(c => myGuessed.includes(c)) || myHearts <= 0) {
                update(ref(db, `rooms/${roomKey}`), { status: "finished" });
            }
        }

        function renderUI(data) {
            const display = document.getElementById('word-display');
            display.innerHTML = "";
            data.target.split("").forEach(c => {
                const s = document.createElement("div"); s.className = "slot";
                s.innerText = myGuessed.includes(c) ? c : ""; display.appendChild(s);
            });
            
            // 進捗状況の描画
            const progList = document.getElementById('progress-list');
            progList.innerHTML = "";
            Object.entries(data.players).forEach(([pid, p]) => {
                if(pid === myId) return;
                const gStr = p.guessedStr || "";
                const div = document.createElement('div'); div.className = "p-box";
                div.innerHTML = `<span>${p.name}</span>`;
                const slots = document.createElement('div'); slots.className = "p-slots";
                data.target.split("").forEach(char => {
                    const dot = document.createElement('div');
                    dot.className = "p-dot" + (gStr.includes(char) ? " filled" : "");
                    slots.appendChild(dot);
                });
                div.appendChild(slots); progList.appendChild(div);
            });

            document.querySelectorAll('.key').forEach(k => k.classList.remove('my-correct', 'wrong-all'));
            if(data.wrongAll) data.wrongAll.forEach(c => document.getElementById("k-"+c)?.classList.add('wrong-all'));
            myGuessed.forEach(c => document.getElementById("k-"+c)?.classList.add('my-correct'));
            
            const pList = Object.entries(data.players).map(([id, p]) => ({id, ...p}));
            const curP = pList[data.turnIdx];
            document.getElementById('turn-msg').innerText = (curP?.id === myId) ? "★ あなたの番 ★" : `${curP?.name}の番...`;
            document.getElementById('heart-count').innerText = " × " + Math.max(0, myHearts);
        }

        function showResult(data, players) {
            showScreen('screen-result');
            document.getElementById('res-word').innerText = "正解: " + data.target;
            const area = document.getElementById('res-ranking'); area.innerHTML = "";
            const sorted = players.sort((a,b) => b.score - a.score);
            document.getElementById('res-status').innerText = (sorted[0].id === myId) ? "YOU WIN!" : "GAME OVER";
            sorted.forEach((p, i) => {
                area.innerHTML += `<div>${i+1}位: ${p.name} (${p.score}文字)</div>`;
            });
        }
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
