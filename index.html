<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>コトバ・サバイバル v30</title>
    <style>
        :root { --main: #4a90e2; --sub: #2ed573; --danger: #ff4757; --bg: #f4f7f9; }
        body { background: var(--bg); font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; text-align: center; color: #333; overflow-x: hidden; }
        
        .game-wrapper { display: flex; justify-content: center; align-items: flex-start; gap: 15px; padding: 10px; max-width: 1200px; margin: 0 auto; }
        .side-panel { width: 220px; flex-shrink: 0; margin-top: 15px; position: sticky; top: 15px; }
        .main-column { flex: 1; max-width: 500px; min-width: 320px; }

        .panel { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); box-sizing: border-box; margin-bottom: 15px; position: relative; }
        .screen { display: none; }
        .active { display: block; }
        
        .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; width: 100%; box-sizing: border-box; }
        .btn-primary { background: var(--main); color: white; }
        .btn-host { background: orange; color: white; margin-top: 10px; font-size: 1.1rem; }
        
        input[type="text"], input[type="number"] { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 1rem; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        input[type="color"] { border: 1px solid #ddd; border-radius: 8px; cursor: pointer; }

        .entry-settings { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: left; font-size: 0.9rem; border: 1px solid #eee; }
        
        .vote-list { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 8px; }
        .vote-btn { background: white; border: 1px solid #ddd; padding: 8px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; display: flex; justify-content: space-between; }
        .vote-btn.voted { border-color: var(--main); background: #eef2ff; font-weight: bold; }
        .host-select-mode { border: 2px solid orange !important; background: #fff8e1; }

        /* アイテムBOX */
        .item-box { margin-top: 20px; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: none; }
        .item-btn { width: 100%; background: #ffd32a; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 0 #d4a017; font-size: 0.9rem; }
        .item-btn:active { transform: translateY(2px); box-shadow: none; }
        .item-count { background: #333; color: white; padding: 2px 8px; border-radius: 10px; margin-left: 5px; }

        /* ゲーム中表示 */
        #game-genre-label { position: absolute; top: 10px; left: 15px; background: rgba(0,0,0,0.7); color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        
        /* 🎈風船を元のサイズに */
        #heart-status { margin-bottom: 10px; font-size: 1.8rem; letter-spacing: 2px; }

        /* キーボード */
        .kb-container { background: #e2e8f0; padding: 8px; border-radius: 12px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .key { aspect-ratio: 1.1; background: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: bold; cursor: pointer; box-shadow: 0 2px 0 #cbd5e0; }
        .key.my-correct { background: var(--sub) !important; color: white; box-shadow: none; }
        .key.wrong-all { background: var(--danger) !important; color: white; box-shadow: none; }
        .key.removed { background: #cbd5e0 !important; opacity: 0.3; pointer-events: none; }
        
        #chat-area { display: flex; flex-direction: column; height: 350px; background: white; padding: 12px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        #chat-box { flex: 1; overflow-y: auto; text-align: left; font-size: 0.85rem; background: #f8f9fa; border-radius: 8px; padding: 8px; margin-bottom: 8px; }
        .stamp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: white; padding: 12px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .stamp-btn { font-size: 1.5rem; padding: 10px 0; border: none; background: #f0f3f5; border-radius: 12px; cursor: pointer; box-shadow: 0 3px 0 #ddd; }

        #stamp-popup { position: fixed; top: 20%; left: 50%; transform: translate(-50%, -50%) scale(0); background: white; padding: 15px 30px; border-radius: 40px; border: 3px solid var(--main); z-index: 10000; transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); font-weight: bold; font-size: 1.5rem; }
        #stamp-popup.show { transform: translate(-50%, -50%) scale(1); }

        @media (max-width: 900px) {
            .game-wrapper { flex-direction: column; align-items: center; }
            .side-panel { width: 94%; max-width: 500px; position: static; }
        }
    </style>
</head>
<body>

    <div id="stamp-popup"></div>
    <div id="wrong-toast" style="position:fixed; top:40%; left:50%; transform:translate(-50%,-50%) scale(0); background:rgba(0,0,0,0.85); color:white; padding:20px 30px; border-radius:15px; z-index:999; transition:0.3s; pointer-events:none; font-size:1.2rem; font-weight:bold;"></div>

    <div class="game-wrapper">
        <div class="side-panel" id="side-left" style="display:none;">
            <div id="chat-area">
                <div id="chat-box"></div>
                <input type="text" id="chat-input" placeholder="Enterで送信">
            </div>
        </div>

        <div class="main-column">
            <div id="screen-entry" class="screen active panel">
                <h1 style="color:var(--main); margin-top:0;">コトバ・サバイバル</h1>
                
                <div style="text-align: right; margin-bottom: 10px;">
                    <button id="btn-sound" class="btn" style="background:#8e44ad; color:white; width:auto; padding:6px 12px; font-size:0.8rem;">🔊 効果音: ON</button>
                </div>

                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <input type="text" id="input-name" placeholder="なまえ" value="プレイヤー" style="flex:1; margin-bottom:0;">
                    <input type="color" id="input-color" value="#4a90e2" style="width:50px; height:42px; padding:0;">
                </div>
                <input type="text" id="input-room" placeholder="部屋ID" value="123">
                
                <div class="entry-settings">
                    <b style="color:#555;">👑 ホスト用設定（作る人）</b><br>
                    <div style="margin-top:8px;">
                        ジャンル決定方式：<br>
                        <label><input type="radio" name="entry-mode" value="vote" checked> みんなで投票</label> &nbsp;
                        <label><input type="radio" name="entry-mode" value="host"> ホストが選ぶ</label>
                    </div>
                </div>

                <div style="display:flex; gap:10px;">
                    <button id="btn-create" class="btn btn-primary" style="flex:1">作る</button>
                    <button id="btn-join" class="btn btn-primary" style="flex:1; background:var(--sub)">参加</button>
                </div>
            </div>

            <div id="screen-lobby" class="screen panel">
                <h2 style="margin-top:0;">待機ロビー</h2>
                
                <p style="font-weight:bold; margin-bottom:15px; font-size:1.05rem;">メンバー: <span id="lobby-members" style="color:var(--main);">---</span></p>
                
                <div class="vote-section">
                    <div id="vote-title" style="font-weight:bold; font-size:0.9rem;">🎨 ジャンル設定</div>
                    <div class="vote-list" id="vote-list"></div>
                </div>
                <div class="host-only" style="display:none; margin-top:20px; background:#f9f9f9; padding:15px; border-radius:12px;">
                    <div style="margin-bottom:10px; font-weight:bold;">ホスト操作</div>
                    風船数: <input type="number" id="select-h" value="17" style="width:70px; display:inline-block; margin-bottom:0;"> 🎈<br>
                    <button id="btn-add-cpu" class="btn" style="background:#636e72; color:white; margin-top:10px; padding:8px;">＋ CPU追加</button>
                    <button id="btn-start" class="btn btn-host">ゲーム開始！</button>
                </div>
                <p id="guest-msg" style="font-size:0.8rem; color:#666; margin-top:15px; font-weight:bold;">ホストの開始待ち...</p>
            </div>

            <div id="screen-game" class="screen panel">
                <div id="game-genre-label">---</div>
                <div id="turn-msg" style="font-weight:bold; font-size:1.1rem; padding:5px;">準備中...</div>
                <div id="heart-status"></div>
                <div id="word-display" style="display:flex; justify-content:center; flex-wrap:wrap; margin-bottom:15px;"></div>
                <div id="progress-area"></div>
                <div id="keyboard" class="kb-container"></div>
            </div>

            <div id="screen-result" class="screen panel">
                <h1 id="res-status" style="font-size:2.2rem; color:var(--main);">RESULT</h1>
                <h2 id="res-word" style="background:#eee; padding:15px; border-radius:10px;"></h2>
                <div id="res-ranking" style="text-align:left; margin:20px 0;"></div>
                <button id="btn-replay" class="btn btn-host host-only" style="display:none;">もう一度</button>
                <button onclick="location.reload()" class="btn btn-primary" style="margin-top:10px;">タイトルへ</button>
            </div>
        </div>

        <div class="side-panel" id="side-right" style="display:none;">
            <div class="stamp-grid">
                <button class="stamp-btn" onclick="sendStamp('👏')">👏</button>
                <button class="stamp-btn" onclick="sendStamp('👍')">👍</button>
                <button class="stamp-btn" onclick="sendStamp('😮')">😮</button>
                <button class="stamp-btn" onclick="sendStamp('😭')">😭</button>
                <button class="stamp-btn" style="grid-column: span 2" onclick="sendStamp('💢')">💢</button>
            </div>
            
            <div class="item-box" id="item-box-container">
                <div style="font-weight:bold; font-size:0.8rem; color:#666;">ITEM BOX</div>
                <button id="item-use-btn" class="item-btn" onclick="useItem()" style="display:none;">
                    🎁 ミステリーBOX <span id="item-qty" class="item-count">0</span>
                </button>
                <div id="item-empty" style="font-size:0.7rem; color:#999; margin-top:10px; font-weight:bold;">回答時に10%の確率で<br>手に入ります！</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, onDisconnect, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { dictionary } from "./questions.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWddxiv4O3gJW2Fyf2gGEwWs5dCiWuu7Y",
            authDomain: "airhockey-1e251.firebaseapp.app",
            projectId: "airhockey-1e251",
            databaseURL: "https://airhockey-1e251-default-rtdb.asia-southeast1.firebasedatabase.app",
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myId, myName, myColor, roomKey, isHost = false, currentData = null, lastStatus = "entry", lastStampTime = 0;
        let myItems = 0, myVote = "";
        
        // --- 効果音システム ---
        let soundEnabled = true;
        let audioCtx;
        document.getElementById('btn-sound').onclick = (e) => {
            soundEnabled = !soundEnabled;
            e.target.innerText = soundEnabled ? "🔊 効果音: ON" : "🔇 効果音: OFF";
            e.target.style.background = soundEnabled ? "#8e44ad" : "#a4b0be";
        };

        function playSound(type) {
            if(!soundEnabled) return;
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if(type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if(type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if(type === 'item') {
                osc.type = 'square'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if(type === 'turn') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.setValueAtTime(660, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        const kanaGroups = [
            { label: "あ行", chars: "あいうえお" }, { label: "か行", chars: "かきくけこ" }, { label: "さ行", chars: "さしすせそ" }, { label: "たち行", chars: "たちつてと" }, { label: "な行", chars: "なにぬねの" }, { label: "は行", chars: "はひふへほ" }, { label: "ま行", chars: "まみむめも" }, { label: "や行", chars: "やゆよ" }, { label: "ら行", chars: "らりるれろ" }, { label: "わ行", chars: "わをんー" }, { label: "濁・小", chars: "がぎぐげござじずぜぞだぢづでどばびぶべぼぱぴぷぺぽゃゅょっぁぃぅぇぉゔ" }
        ];

        const getPlayerKeys = (playersObj) => Object.keys(playersObj || {}).sort();

        const entry = (host) => {
            if(soundEnabled && !audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            isHost = host;
            myName = document.getElementById('input-name').value || "プレイヤー";
            myColor = document.getElementById('input-color').value; // 🎨 カラー取得復活
            roomKey = "room_" + (document.getElementById('input-room').value || "123");
            myId = Math.random().toString(36).slice(2, 7);
            
            showScreen('screen-lobby');
            document.getElementById('side-left').style.display = 'block';
            document.getElementById('side-right').style.display = 'block';
            if(host) document.querySelectorAll('.host-only').forEach(el => el.style.display = 'block');
            else document.getElementById('guest-msg').style.display = 'block';
            
            const roomRef = ref(db, `rooms/${roomKey}`);
            if(host) {
                const mode = document.querySelector('input[name="entry-mode"]:checked').value;
                set(roomRef, { status: "lobby", genreMode: mode, votes: {}, selectedByHost: "オールジャンル", lastStamp: {time:0} });
            }
            
            // 🎨 colorにmyColorをセット
            set(ref(db, `rooms/${roomKey}/players/${myId}`), { name: myName, score: 0, guessedStr: "", hearts: 17, color: myColor, isCPU: false, items: 0 });
            onDisconnect(ref(db, `rooms/${roomKey}/players/${myId}`)).remove();
            
            onValue(roomRef, (snap) => {
                const data = snap.val(); if(!data) return;
                currentData = data;
                
                const pKeys = getPlayerKeys(data.players);
                document.getElementById('lobby-members').innerHTML = pKeys.map(id => `<span style="color:${data.players[id].color}">${data.players[id].name}</span>`).join(", ");
                
                renderVotes(data);
                
                document.getElementById('item-box-container').style.display = (data.status === "playing") ? 'block' : 'none';
                
                myItems = data.players[myId]?.items || 0;
                document.getElementById('item-qty').innerText = myItems;
                document.getElementById('item-use-btn').style.display = myItems > 0 ? 'block' : 'none';
                document.getElementById('item-empty').style.display = myItems > 0 ? 'none' : 'block';

                if(data.lastStamp?.time > lastStampTime) { lastStampTime = data.lastStamp.time; showStampPopup(data.lastStamp); }
                
                if(data.status === "playing" && isHost) {
                    const curP = data.players[pKeys[data.turnIdx]];
                    if(curP?.isCPU) handleCPUTurn(pKeys[data.turnIdx], data);
                }

                if(data.status !== lastStatus) {
                    lastStatus = data.status;
                    if(data.status === "playing") initGame(data);
                    else if(data.status === "finished") showResult(data, pKeys);
                    else if(data.status === "lobby") showScreen('screen-lobby');
                } else if(data.status === "playing") renderUI(data);
            });
        };

        function renderVotes(data) {
            const list = document.getElementById('vote-list'); list.innerHTML = "";
            const isHostMode = data.genreMode === "host";
            document.getElementById('vote-title').innerText = isHostMode ? "👑 ホストがジャンルを選択中" : "🎨 ジャンル投票";
            
            const genres = Array.from(new Set([...Object.keys(dictionary), "オールジャンル"]));
            
            genres.forEach(g => {
                const count = Object.values(data.votes || {}).filter(v => v === g).length;
                const b = document.createElement('div');
                b.className = `vote-btn ${myVote === g ? 'voted' : ''} ${isHostMode && data.selectedByHost === g ? 'host-select-mode' : ''}`;
                b.innerHTML = `<span>${g}</span> <b>${isHostMode ? '' : count}</b>`;
                
                b.onclick = () => {
                    if(isHostMode) {
                        if(isHost) update(ref(db, `rooms/${roomKey}`), { selectedByHost: g });
                    } else {
                        myVote = g; update(ref(db, `rooms/${roomKey}/votes`), { [myId]: g });
                    }
                };
                list.appendChild(b);
            });
        }

        function handleCPUTurn(cpuId, data) {
            setTimeout(() => {
                const allKana = kanaGroups.map(g => g.chars).join("").split("");
                const guessed = Object.values(data.players).flatMap(p => (p.guessedStr || "").split(","));
                const wrong = data.wrongAll || [];
                const possible = allKana.filter(c => !guessed.includes(c) && !wrong.includes(c) && !data.config.removed?.includes(c));
                if(possible.length > 0) processGuess(cpuId, possible[Math.floor(Math.random() * possible.length)]);
            }, 1500);
        }

        function processGuess(pid, char) {
            const data = currentData; const p = data.players[pid]; const updates = {};
            
            if(Math.random() < 0.1) {
                updates[`players/${pid}/items`] = (p.items || 0) + 1;
                if(pid === myId) {
                    showWrongToast("🎁 アイテムGET！");
                    playSound('item'); // 🔊 音追加
                }
            }

            if(data.target.includes(char)) {
                const g = (p.guessedStr ? p.guessedStr + "," : "") + char;
                updates[`players/${pid}/guessedStr`] = g;
                updates[`players/${pid}/score`] = g.split(",").length;
                if(pid === myId) playSound('correct'); // 🔊 音追加
            } else {
                updates[`players/${pid}/hearts`] = (p.hearts || 0) - 1;
                const wa = data.wrongAll || []; wa.push(char); updates[`wrongAll`] = wa;
                updates[`lastWrong`] = { char, time: Date.now() };
                if(pid === myId) playSound('wrong'); // 🔊 音追加
            }
            const pKeys = getPlayerKeys(data.players);
            updates[`turnIdx`] = (data.turnIdx + 1) % pKeys.length;
            update(ref(db, `rooms/${roomKey}`), updates);
            
            const latest = {...data.players};
            if(updates[`players/${pid}/guessedStr`]) latest[pid].guessedStr = updates[`players/${pid}/guessedStr`];
            if(updates[`players/${pid}/hearts`] !== undefined) latest[pid].hearts = updates[`players/${pid}/hearts`];
            const clear = data.target.split("").every(c => Object.values(latest).some(pl => (pl.guessedStr || "").includes(c)));
            if(clear || latest[pid].hearts <= 0) setTimeout(() => update(ref(db, `rooms/${roomKey}`), { status: "finished" }), 800);
        }

        window.useItem = () => {
            if(myItems <= 0) return;
            const effects = ["HEAL", "ATTACK", "REVEAL", "CLEAN"];
            const effect = effects[Math.floor(Math.random() * effects.length)];
            const updates = {};
            const pList = currentData.players;

            playSound('item'); // 🔊 音追加

            if(effect === "HEAL") {
                showWrongToast("🎈 風船が5回復した！");
                updates[`players/${myId}/hearts`] = (pList[myId].hearts || 0) + 5;
            } else if(effect === "ATTACK") {
                showWrongToast("💣 全員の風船を3割った！");
                Object.keys(pList).forEach(id => { if(id !== myId) updates[`players/${id}/hearts`] = Math.max(0, (pList[id].hearts || 0) - 3); });
            } else if(effect === "REVEAL") {
                showWrongToast("🔍 一文字判明した！");
                const hidden = currentData.target.split("").filter(c => !(pList[myId].guessedStr || "").includes(c));
                if(hidden.length > 0) {
                    const char = hidden[Math.floor(Math.random() * hidden.length)];
                    const g = (pList[myId].guessedStr ? pList[myId].guessedStr + "," : "") + char;
                    updates[`players/${myId}/guessedStr`] = g;
                    updates[`players/${myId}/score`] = g.split(",").length;
                }
            } else if(effect === "CLEAN") {
                showWrongToast("🧹 不要な10文字を除去！");
                const allKana = kanaGroups.map(g => g.chars).join("").split("");
                const wrong = currentData.wrongAll || [];
                const possible = allKana.filter(c => !currentData.target.includes(c) && !wrong.includes(c));
                const removeSet = possible.sort(() => 0.5 - Math.random()).slice(0, 10);
                updates[`wrongAll`] = [...wrong, ...removeSet];
            }

            updates[`players/${myId}/items`] = myItems - 1;
            update(ref(db, `rooms/${roomKey}`), updates);
        };

        document.getElementById('btn-add-cpu').onclick = () => {
            const players = Object.values(currentData.players || {});
            const cpuIndex = players.filter(p => p.isCPU).length + 1;
            set(ref(db, `rooms/${roomKey}/players/cpu_${cpuIndex}`), { name: "CPU" + cpuIndex, score: 0, guessedStr: "", hearts: 17, color: "#636e72", isCPU: true });
        };

        document.getElementById('btn-start').onclick = () => {
            const isVote = currentData.genreMode === "vote";
            let genre = "オールジャンル";
            if(isVote) {
                const voteValues = Object.values(currentData.votes || {});
                if(voteValues.length > 0) genre = voteValues[Math.floor(Math.random() * voteValues.length)];
            } else {
                genre = currentData.selectedByHost || "オールジャンル";
            }
            let pool = (genre === "オールジャンル") ? Object.values(dictionary).flat() : dictionary[genre];
            const target = pool[Math.floor(Math.random() * pool.length)];
            const h = parseInt(document.getElementById('select-h').value);
            
            const updates = { status: "playing", target, turnIdx: 0, config: {g: genre, h}, wrongAll: [] };
            Object.keys(currentData.players).forEach(pid => { 
                updates[`players/${pid}/score`] = 0; updates[`players/${pid}/guessedStr`] = ""; updates[`players/${pid}/hearts`] = h; 
            });
            update(ref(db, `rooms/${roomKey}`), updates);
        };

        let lastTurnIdx = -1; // ターン切り替え検知用
        function initGame(data) {
            showScreen('screen-game');
            document.getElementById('game-genre-label').innerText = "ジャンル: " + data.config.g;
            const kb = document.getElementById('keyboard'); kb.innerHTML = "";
            
            kanaGroups.forEach(group => {
                const label = document.createElement("div");
                label.className = "key-group-label";
                label.style.gridColumn = "span 5";
                label.style.fontSize = "0.75rem";
                label.style.textAlign = "left";
                label.style.fontWeight = "bold";
                label.style.color = "#718096";
                label.style.padding = "6px 2px 2px";
                label.innerText = group.label;
                kb.appendChild(label);

                group.chars.split("").forEach(c => {
                    const k = document.createElement("div");
                    k.className = "key"; 
                    k.id = "k-" + c; 
                    k.innerText = c;
                    k.onclick = () => { 
                        const pKeys = getPlayerKeys(currentData.players);
                        if(pKeys[currentData.turnIdx] === myId) processGuess(myId, c); 
                    };
                    kb.appendChild(k);
                });
            });
            lastTurnIdx = -1;
            renderUI(data);
        }

        function renderUI(data) {
            const myP = data.players[myId];
            document.getElementById('heart-status').innerText = "🎈".repeat(Math.max(0, myP.hearts || 0));
            const display = document.getElementById('word-display'); display.innerHTML = "";
            data.target.split("").forEach(c => {
                const s = document.createElement("div"); s.style="width:28px; height:38px; border-bottom:3px solid #ccc; margin:3px; font-size:1.4rem; font-weight:bold; display:flex; justify-content:center; align-items:center;";
                s.innerText = (myP.guessedStr || "").includes(c) ? c : ""; display.appendChild(s);
            });
            
            const progArea = document.getElementById('progress-area'); progArea.innerHTML = "";
            const pKeys = getPlayerKeys(data.players);
            
            pKeys.forEach(pid => {
                const p = data.players[pid];
                progArea.innerHTML += `<div style="display:flex; align-items:center; gap:8px; font-size:0.8rem; margin-bottom:5px; background:#f9f9f9; padding:5px; border-radius:8px;">
                    <div style="min-width:80px; text-align:right;">
                        <b style="color:${p.color}">${p.name}</b><br>
                        <span>🎈${p.hearts}</span>
                    </div>
                    <div style="display:flex; gap:2px;">${data.target.split("").map(c => `<div style="width:8px; height:8px; border-radius:50%; background:${(p.guessedStr||"").includes(c)?p.color:'#ddd'}"></div>`).join("")}</div>
                </div>`;
            });

            document.querySelectorAll('.key').forEach(k => k.classList.remove('my-correct', 'wrong-all'));
            if(data.wrongAll) data.wrongAll.forEach(c => document.getElementById("k-"+c)?.classList.add('wrong-all'));
            (myP.guessedStr || "").split(",").forEach(c => document.getElementById("k-"+c)?.classList.add('my-correct'));
            
            const curP = data.players[pKeys[data.turnIdx]];
            const msg = document.getElementById('turn-msg'); 
            msg.innerText = (curP?.name === myName) ? "★ あなたの番 ★" : `${curP?.name}の番...`;
            msg.style.color = curP?.color || "#333";

            // 🔊 自分のターンが回ってきたときに音を鳴らす
            if (data.turnIdx !== lastTurnIdx) {
                if (curP?.name === myName) playSound('turn');
                lastTurnIdx = data.turnIdx;
            }
        }

        function showResult(data, pKeys) {
            showScreen('screen-result');
            document.getElementById('res-word').innerText = "正解: " + data.target;
            const area = document.getElementById('res-ranking'); area.innerHTML = "";
            const players = pKeys.map(id => data.players[id]);
            players.sort((a,b)=>b.score-a.score).forEach((p,i)=> area.innerHTML += `<div style="padding:8px; border-bottom:1px solid #eee;"><b style="color:${p.color}">${i+1}位: ${p.name}</b> (正解:${p.score} / 🎈${p.hearts})</div>`);
        }

        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function showWrongToast(m) { const t=document.getElementById('wrong-toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 1500); }
        window.sendStamp = (emoji) => update(ref(db, `rooms/${roomKey}`), { lastStamp: { emoji, sender: myName, time: Date.now() } });
        function showStampPopup(s) { const p=document.getElementById('stamp-popup'); p.innerText=`${s.sender}: ${s.emoji}`; p.classList.add('show'); setTimeout(()=>p.classList.remove('show'), 1500); }
        
        document.getElementById('btn-create').onclick = () => entry(true);
        document.getElementById('btn-join').onclick = () => entry(false);
        document.getElementById('btn-replay').onclick = document.getElementById('btn-start').onclick;
    </script>
</body>
</html>
