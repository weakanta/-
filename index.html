<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>コトバ・サバイバル v25</title>
    <style>
        :root { --main: #4a90e2; --sub: #2ed573; --danger: #ff4757; --bg: #f4f7f9; }
        body { background: var(--bg); font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; text-align: center; color: #333; overflow-x: hidden; }
        
        .game-wrapper { display: flex; justify-content: center; align-items: flex-start; gap: 15px; padding: 10px; max-width: 1100px; margin: 0 auto; }
        .side-panel { width: 220px; flex-shrink: 0; margin-top: 15px; position: sticky; top: 15px; }
        .main-column { flex: 1; max-width: 480px; min-width: 320px; }

        .panel { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); box-sizing: border-box; margin-bottom: 15px; }
        .screen { display: none; }
        .active { display: block; }
        
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; width: 100%; margin: 5px 0; box-sizing: border-box; }
        .btn { padding: 14px 24px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn-primary { background: var(--main); color: white; }
        .btn-host { background: orange; color: white; width: 100%; margin-top: 15px; font-size: 1.2rem; }
        
        /* 5列キーボード */
        .kb-container { background: #e2e8f0; padding: 8px; border-radius: 12px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .key { aspect-ratio: 1.1; background: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: bold; cursor: pointer; box-shadow: 0 2px 0 #cbd5e0; }
        .key.my-correct { background: var(--sub) !important; color: white; box-shadow: none; }
        .key.wrong-all { background: var(--danger) !important; color: white; box-shadow: none; }
        .key.removed { background: #cbd5e0 !important; opacity: 0.3; pointer-events: none; box-shadow: none; }
        .key-group-label { grid-column: span 5; font-size: 0.75rem; color: #718096; text-align: left; padding: 6px 2px 2px; font-weight: bold; }

        .color-picker { display: flex; justify-content: center; gap: 10px; margin: 10px 0; padding: 10px; background: #eee; border-radius: 12px; }
        .color-dot { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.2s; position: relative; }
        .color-dot.selected { border-color: #333; transform: scale(1.1); }
        .color-dot.taken { opacity: 0.2; cursor: not-allowed; pointer-events: none; }

        /* サイドパネル */
        #chat-area { display: flex; flex-direction: column; height: 350px; background: white; padding: 12px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        #chat-box { flex: 1; overflow-y: auto; text-align: left; font-size: 0.85rem; background: #f8f9fa; border-radius: 8px; padding: 8px; margin-bottom: 8px; border: 1px solid #eee; }
        
        .stamp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: white; padding: 12px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .stamp-btn { font-size: 1.5rem; padding: 10px 0; border: none; background: #f0f3f5; border-radius: 12px; cursor: pointer; box-shadow: 0 3px 0 #ddd; }

        /* 進捗 & ハート */
        #progress-area { margin-bottom: 15px; background: #f9f9f9; padding: 10px; border-radius: 15px; }
        .prog-row { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; margin: 6px 0; }
        .prog-info { display: flex; flex-direction: column; min-width: 80px; text-align: right; }
        .prog-name { font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .prog-hearts { color: var(--danger); font-size: 0.7rem; }
        .p-dot-container { display: flex; gap: 3px; flex-wrap: wrap; }
        .p-dot { width: 10px; height: 10px; background: #ddd; border-radius: 50%; flex-shrink: 0; }
        
        #stamp-popup { position: fixed; top: 20%; left: 50%; transform: translate(-50%, -50%) scale(0); background: white; padding: 15px 30px; border-radius: 40px; border: 3px solid var(--main); z-index: 10000; transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); font-weight: bold; pointer-events: none; font-size: 1.5rem; }
        #stamp-popup.show { transform: translate(-50%, -50%) scale(1); }

        @media (max-width: 900px) {
            .game-wrapper { flex-direction: column; align-items: center; }
            .side-panel { width: 94%; max-width: 500px; position: static; }
        }
    </style>
</head>
<body>

    <div id="stamp-popup"></div>
    <div id="wrong-toast" style="position:fixed; top:40%; left:50%; transform:translate(-50%,-50%) scale(0); background:rgba(0,0,0,0.8); color:white; padding:20px; border-radius:15px; z-index:999; transition:0.3s; pointer-events:none;"></div>

    <div class="game-wrapper">
        <div class="side-panel" id="side-left" style="display:none;">
            <div id="chat-area">
                <div id="chat-box"></div>
                <input type="text" id="chat-input" placeholder="Enterで送信">
            </div>
        </div>

        <div class="main-column">
            <div id="screen-entry" class="screen active panel">
                <h1 style="color:var(--main)">コトバ・サバイバル</h1>
                <input type="text" id="input-name" placeholder="なまえ" value="プレイヤー">
                <input type="text" id="input-room" placeholder="部屋ID" value="123">
                <div style="margin-top:20px; display:flex; gap:10px;">
                    <button id="btn-create" class="btn btn-primary" style="flex:1">作る</button>
                    <button id="btn-join" class="btn btn-primary" style="flex:1; background:var(--sub)">参加</button>
                </div>
            </div>

            <div id="screen-lobby" class="screen panel">
                <h2>待機ロビー</h2>
                <div class="color-picker" id="lobby-color-picker">
                    <div class="color-dot" style="background:#4a90e2" data-color="#4a90e2"></div>
                    <div class="color-dot" style="background:#ff4757" data-color="#ff4757"></div>
                    <div class="color-dot" style="background:#2ed573" data-color="#2ed573"></div>
                    <div class="color-dot" style="background:#ffa502" data-color="#ffa502"></div>
                    <div class="color-dot" style="background:#af7ac5" data-color="#af7ac5"></div>
                    <div class="color-dot" style="background:#576574" data-color="#576574"></div>
                </div>
                <p>メンバー: <span id="lobby-members">---</span></p>
                <div class="host-only" style="display:none; text-align:left; background:#f9f9f9; padding:10px; border-radius:10px;">
                    ジャンル: <select id="select-g"></select><br>
                    ライフ: <input type="number" id="select-h" value="17" style="width:70px;"><br>
                    <label><input type="checkbox" id="check-cpu"> CPUを1体追加する</label>
                </div>
                <button id="btn-start" class="btn btn-host host-only" style="display:none;">開始！</button>
            </div>

            <div id="screen-game" class="screen panel">
                <div id="turn-msg">準備中...</div>
                <div id="word-display" style="display:flex; justify-content:center; flex-wrap:wrap; margin-bottom:15px;"></div>
                <div id="progress-area"></div>
                <div id="keyboard" class="kb-container"></div>
            </div>

            <div id="screen-result" class="screen panel">
                <h1 id="res-status">RESULT</h1>
                <h2 id="res-word"></h2>
                <div id="res-ranking"></div>
                <button id="btn-replay" class="btn btn-host host-only" style="display:none;">もう一度遊ぶ</button>
            </div>
        </div>

        <div class="side-panel" id="side-right" style="display:none;">
            <div class="stamp-grid">
                <button class="stamp-btn" onclick="sendStamp('👏')">👏</button>
                <button class="stamp-btn" onclick="sendStamp('👍')">👍</button>
                <button class="stamp-btn" onclick="sendStamp('😮')">😮</button>
                <button class="stamp-btn" onclick="sendStamp('😭')">😭</button>
                <button class="stamp-btn" style="grid-column: span 2" onclick="sendStamp('💢')">💢</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, onDisconnect, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { dictionary } from "./questions.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWddxiv4O3gJW2Fyf2gGEwWs5dCiWuu7Y",
            authDomain: "airhockey-1e251.firebaseapp.app",
            projectId: "airhockey-1e251",
            databaseURL: "https://airhockey-1e251-default-rtdb.asia-southeast1.firebasedatabase.app",
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let audioCtx, myId, myName, roomKey, isHost = false, currentData = null;
        let lastTurnId = "", lastStatus = "entry", lastWrongTime = 0, lastStampTime = 0;

        function playTone(freq, duration, type = "sine") {
            try {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type; osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        const kanaGroups = [
            { label: "あ行", chars: "あいうえお" }, { label: "か行", chars: "かきくけこ" },
            { label: "さ行", chars: "さしすせそ" }, { label: "たち行", chars: "たちつてと" },
            { label: "な行", chars: "なにぬねの" }, { label: "は行", chars: "はひふへほ" },
            { label: "ま行", chars: "まみむめも" }, { label: "や行", chars: "やゆよ" },
            { label: "ら行", chars: "らりるれろ" }, { label: "わ行", chars: "わをんー" },
            { label: "濁・小", chars: "がぎぐげござじずぜぞだぢづでどばびぶべぼぱぴぷぺぽゃゅょっぁぃぅぇぉゔ" }
        ];

        const entry = (host) => {
            isHost = host;
            myName = document.getElementById('input-name').value || "プレイヤー";
            roomKey = "room_" + (document.getElementById('input-room').value || "123");
            myId = Math.random().toString(36).slice(2, 7);
            
            showScreen('screen-lobby');
            document.getElementById('side-left').style.display = 'block';
            document.getElementById('side-right').style.display = 'block';
            if(host) document.querySelectorAll('.host-only').forEach(el => el.style.display = 'block');
            
            const roomRef = ref(db, `rooms/${roomKey}`);
            if(host) set(roomRef, { status: "lobby", lastStamp: {time:0} });
            set(ref(db, `rooms/${roomKey}/players/${myId}`), { name: myName, score: 0, guessedStr: "", host: host, color: "#4a90e2", hearts: 17, isCPU: false });
            onDisconnect(ref(db, `rooms/${roomKey}/players/${myId}`)).remove();

            onValue(roomRef, (snap) => {
                const data = snap.val(); if(!data) return;
                currentData = data;
                const players = Object.entries(data.players || {}).map(([id, p]) => ({id, ...p}));
                document.getElementById('lobby-members').innerText = players.map(p => p.name).join(", ");
                updateColorDots(players);

                if(data.lastStamp && data.lastStamp.time > lastStampTime) {
                    lastStampTime = data.lastStamp.time; showStampPopup(data.lastStamp);
                }

                if(data.status === "playing") {
                    const curP = players[data.turnIdx];
                    if(curP?.id !== lastTurnId) {
                        lastTurnId = curP?.id;
                        if(lastTurnId === myId) playTone(440, 0.05, "triangle");
                        // CPUのターン処理（ホストが代行）
                        if(isHost && curP?.isCPU) setTimeout(() => cpuTurn(curP.id), 1500);
                    }
                    if(data.lastWrong && data.lastWrong.time > lastWrongTime) {
                        lastWrongTime = data.lastWrong.time;
                        showWrongToast(data.lastWrong.char); playTone(220, 0.3, "square");
                    }
                }

                if(data.status !== lastStatus) {
                    lastStatus = data.status;
                    if(data.status === "playing") initGame(data);
                    else if(data.status === "finished") showResult(data, players);
                    else if(data.status === "lobby") showScreen('screen-lobby');
                } else if(data.status === "playing") { renderUI(data); }
            });

            onValue(ref(db, `rooms/${roomKey}/chats`), (snap) => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                const chats = snap.val();
                if(chats) {
                    Object.values(chats).slice(-20).forEach(c => {
                        const d = document.createElement('div'); d.innerHTML = `<b>${c.sender}:</b> ${c.msg}`; box.appendChild(d);
                    });
                    box.scrollTop = box.scrollHeight;
                }
            });
        };

        function updateColorDots(players) {
            const takenColors = players.filter(p => p.id !== myId).map(p => p.color);
            document.querySelectorAll('.color-dot').forEach(dot => {
                const c = dot.dataset.color;
                dot.classList.toggle('taken', takenColors.includes(c));
                dot.classList.toggle('selected', players.find(p => p.id === myId)?.color === c);
                dot.onclick = () => { if(!takenColors.includes(c)) update(ref(db, `rooms/${roomKey}/players/${myId}`), { color: c }); };
            });
        }

        // CPUロジック（ホストが実行）
        function cpuTurn(cpuId) {
            if(!currentData || currentData.status !== "playing") return;
            const target = currentData.target;
            const wa = currentData.wrongAll || [];
            const allPossible = kanaGroups.map(g => g.chars).join("").split("");
            const cpuData = currentData.players[cpuId];
            const alreadyGuessed = (cpuData.guessedStr || "").split(",");

            // まだ当てていない正解の文字
            const remainingTarget = target.split("").filter(c => !alreadyGuessed.includes(c));
            // まだ選んでいない全ての文字
            const available = allPossible.filter(c => !wa.includes(c) && !alreadyGuessed.includes(c));

            let choice;
            // 70%の確率で正解から選ぶ、30%で適当に選ぶ
            if(Math.random() < 0.7 && remainingTarget.length > 0) {
                choice = remainingTarget[Math.floor(Math.random() * remainingTarget.length)];
            } else {
                choice = available[Math.floor(Math.random() * available.length)];
            }
            executeGuess(cpuId, choice);
        }

        function executeGuess(pid, char) {
            const data = currentData;
            const p = data.players[pid];
            const isCorrect = data.target.includes(char);
            const updates = {};
            
            if(isCorrect) {
                const newGuessed = p.guessedStr ? p.guessedStr + "," + char : char;
                updates[`players/${pid}/guessedStr`] = newGuessed;
                updates[`players/${pid}/score`] = newGuessed.split(",").length;
            } else {
                const newHearts = Math.max(0, p.hearts - 1);
                updates[`players/${pid}/hearts`] = newHearts;
                const newWA = data.wrongAll || [];
                newWA.push(char);
                updates[`wrongAll`] = newWA;
                updates[`lastWrong`] = { char: char, time: Date.now() };
            }

            const pList = Object.entries(data.players).map(([id, p]) => ({id, ...p}));
            updates[`turnIdx`] = (data.turnIdx + 1) % pList.length;
            update(ref(db, `rooms/${roomKey}`), updates);

            // 終了判定
            const checkPlayers = Object.entries({...data.players, [pid]: {...p, guessedStr: isCorrect ? (p.guessedStr ? p.guessedStr + "," + char : char) : p.guessedStr, hearts: isCorrect ? p.hearts : p.hearts-1 }});
            const gameCleared = data.target.split("").every(c => checkPlayers.some(([_, pl]) => (pl.guessedStr || "").includes(c)));
            const allDead = checkPlayers.every(([_, pl]) => pl.hearts <= 0);
            
            if(gameCleared || allDead) {
                setTimeout(() => update(ref(db, `rooms/${roomKey}`), { status: "finished" }), 500);
            }
        }

        window.sendStamp = (emoji) => {
            update(ref(db, `rooms/${roomKey}`), { lastStamp: { emoji, sender: myName, time: Date.now() } });
        };

        function showStampPopup(stamp) {
            const p = document.getElementById('stamp-popup');
            p.innerText = `${stamp.sender}: ${stamp.emoji}`; p.classList.add('show');
            setTimeout(() => p.classList.remove('show'), 1500);
        }

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const i = document.getElementById('chat-input'); if(!i.value) return;
                push(ref(db, `rooms/${roomKey}/chats`), { sender: myName, msg: i.value, time: Date.now() });
                i.value = "";
            }
        });

        function initGame(data) {
            showScreen('screen-game');
            const kb = document.getElementById('keyboard'); kb.innerHTML = "";
            kanaGroups.forEach(group => {
                const label = document.createElement("div"); label.className = "key-group-label"; label.innerText = group.label;
                kb.appendChild(label);
                group.chars.split("").forEach(c => {
                    const k = document.createElement("div"); k.className = "key"; k.id = "k-" + c; k.innerText = c;
                    k.onclick = () => {
                        const pList = Object.entries(currentData.players).map(([id, p]) => ({id, ...p}));
                        if(pList[currentData.turnIdx].id === myId) executeGuess(myId, c);
                    };
                    kb.appendChild(k);
                });
            });
            renderUI(data);
        }

        function renderUI(data) {
            const display = document.getElementById('word-display'); display.innerHTML = "";
            const allGuessed = Object.values(data.players).map(p => p.guessedStr || "").join(",");
            data.target.split("").forEach(c => {
                const s = document.createElement("div"); s.className = "slot";
                s.innerText = allGuessed.includes(c) ? c : ""; display.appendChild(s);
            });

            const progArea = document.getElementById('progress-area'); progArea.innerHTML = "";
            Object.entries(data.players).forEach(([pid, p]) => {
                const row = document.createElement('div'); row.className = "prog-row";
                const heartIcons = "❤️".repeat(Math.max(0, p.hearts));
                row.innerHTML = `
                    <div class="prog-info">
                        <span class="prog-name" style="color:${p.color}">${p.name}</span>
                        <span class="prog-hearts">HP:${p.hearts}</span>
                    </div>
                    <div class="p-dot-container"></div>
                `;
                data.target.split("").forEach(char => {
                    const dot = document.createElement('div'); dot.className = "p-dot";
                    if((p.guessedStr || "").includes(char)) dot.style.background = p.color;
                    row.querySelector('.p-dot-container').appendChild(dot);
                });
                progArea.appendChild(row);
            });

            document.querySelectorAll('.key').forEach(k => k.classList.remove('my-correct', 'wrong-all'));
            if(data.wrongAll) data.wrongAll.forEach(c => document.getElementById("k-"+c)?.classList.add('wrong-all'));
            const myP = data.players[myId];
            if(myP && myP.guessedStr) myP.guessedStr.split(",").forEach(c => document.getElementById("k-"+c)?.classList.add('my-correct'));
            
            const curP = Object.entries(data.players).map(([id, p]) => ({id, ...p}))[data.turnIdx];
            const msg = document.getElementById('turn-msg');
            msg.innerText = (curP?.id === myId) ? "★ あなたの番です ★" : `${curP?.name}の番...`;
            msg.style.borderColor = curP?.color || "#ddd";
        }

        function showWrongToast(char) {
            const t = document.getElementById('wrong-toast');
            t.innerText = `「${char}」はありません！`;
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1200);
        }

        function showResult(data, players) {
            showScreen('screen-result');
            document.getElementById('res-word').innerText = "正解: " + data.target;
            const area = document.getElementById('res-ranking'); area.innerHTML = "";
            const sorted = players.sort((a,b) => b.score - a.score);
            document.getElementById('res-status').innerText = "FINISH!";
            sorted.forEach((p, i) => {
                area.innerHTML += `<div style="border-bottom:1px solid #eee; padding:10px 0;"><div style="font-weight:bold; color:${p.color}">${i+1}位: ${p.name} (${p.score}文字)</div><div style="font-size:0.8rem; color:#888;">残ライフ: ${p.hearts}</div></div>`;
            });
        }

        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

        document.getElementById('btn-create').onclick = () => entry(true);
        document.getElementById('btn-join').onclick = () => entry(false);

        const gSel = document.getElementById('select-g');
        Object.keys(dictionary).forEach(g => { const o = document.createElement('option'); o.value=g; o.innerText=g; gSel.appendChild(o); });

        document.getElementById('btn-start').onclick = () => {
            const g = document.getElementById('select-g').value;
            const h = parseInt(document.getElementById('select-h').value);
            const target = dictionary[g][Math.floor(Math.random()*dictionary[g].length)];
            const playersUpdate = {};
            Object.keys(currentData.players).forEach(pid => {
                playersUpdate[`players/${pid}/score`] = 0;
                playersUpdate[`players/${pid}/guessedStr`] = "";
                playersUpdate[`players/${pid}/hearts`] = h;
            });
            if(document.getElementById('check-cpu').checked) {
                playersUpdate[`players/cpu_bot`] = { name: "CPUロボ", score: 0, guessedStr: "", color: "#576574", hearts: h, isCPU: true };
            }
            update(ref(db, `rooms/${roomKey}`), { ...playersUpdate, status: "playing", target: target, turnIdx: 0, config: {g, h}, wrongAll: [] });
        };
    </script>
</body>
</html>
