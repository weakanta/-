<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>コトバ・サバイバル Pro</title>
    <style>
        :root { --main: #4a90e2; --sub: #2ed573; --danger: #ff4757; --bg: #f4f7f9; }
        body { background: var(--bg); font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif; margin: 0; text-align: center; color: #333; }
        .panel { background: white; padding: 20px; border-radius: 20px; width: 94%; max-width: 500px; margin: 15px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.05); box-sizing: border-box; }
        
        /* ロビーフロー */
        .screen { display: none; }
        .active { display: block; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; width: 80%; margin: 5px 0; }
        .btn { padding: 14px 24px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--main); color: white; }
        .btn-host { background: orange; color: white; width: 100%; margin-top: 15px; font-size: 1.1rem; }

        /* 50音キーボード（5列グリッド） */
        .kb-container { background: #e2e8f0; padding: 8px; border-radius: 12px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .key { aspect-ratio: 1.2; background: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: bold; cursor: pointer; box-shadow: 0 2px 0 #cbd5e0; }
        .key.my-used { background: #94a3b8 !important; color: transparent; pointer-events: none; opacity: 0.2; box-shadow: none; }
        .key.wrong-all { background: var(--danger) !important; color: white; }
        .key.removed { background: #cbd5e0 !important; color: transparent; pointer-events: none; opacity: 0.4; box-shadow: none; }
        .key-group-label { grid-column: span 5; font-size: 0.7rem; color: #718096; text-align: left; padding: 4px 0 0 4px; }

        /* ゲーム画面要素 */
        #word-display { display: flex; justify-content: center; gap: 4px; margin: 15px 0; flex-wrap: wrap; }
        .slot { width: 30px; height: 40px; border-bottom: 3px solid #cbd5e0; font-size: 1.4rem; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        #turn-msg { padding: 10px; border-radius: 10px; margin-bottom: 10px; font-weight: bold; border: 2px solid transparent; }
        .my-turn-anim { background: #ebf8ff; color: #2b6cb0; border-color: #bee3f8; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* リザルト */
        .rank-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .host-only { display: none; }
    </style>
</head>
<body>

    <div id="screen-entry" class="screen active panel">
        <h1 style="color:var(--main)">コトバ・サバイバル</h1>
        <input type="text" id="input-name" placeholder="なまえを入力" value="プレイヤー"><br>
        <input type="text" id="input-room" placeholder="部屋IDを入力" value="123"><br>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button id="btn-create" class="btn btn-primary" style="flex:1">部屋を作る</button>
            <button id="btn-join" class="btn btn-primary" style="flex:1; background:var(--sub)">参加する</button>
        </div>
    </div>

    <div id="screen-lobby" class="screen panel">
        <h2>待機中...</h2>
        <div style="text-align:left; background:#f9f9f9; padding:15px; border-radius:12px;">
            <p><b>参加メンバー:</b> <span id="lobby-members">---</span></p>
            <hr>
            <div class="host-only">
                <label>ジャンル:</label><br>
                <select id="select-g">
                    <option value="たべもの">たべもの</option><option value="どうぶつ">どうぶつ</option>
                    <option value="のりもの">のりもの</option><option value="むし">むし</option>
                    <option value="ポケモン">ポケモン</option><option value="ちめい">ちめい</option>
                </select><br>
                <label>ライフ:</label> <input type="number" id="select-h" value="17" style="width:60px;"><br>
                <label>除外文字数:</label> <input type="number" id="select-r" value="10" style="width:60px;">
            </div>
            <div id="guest-view" style="display:none;">
                <p>ジャンル: <b id="view-g">---</b></p>
                <p>ライフ: <b id="view-h">---</b> | 除外: <b id="view-r">---</b></p>
            </div>
        </div>
        <button id="btn-start" class="btn btn-host host-only">ゲームを開始する！</button>
        <p id="guest-msg" style="font-size:0.8rem; color:#666;">ホストが開始するのを待っています...</p>
    </div>

    <div id="screen-game" class="screen panel">
        <div id="turn-msg">読み込み中...</div>
        <div id="heart-bar" style="color:var(--danger); font-size:1.2rem; margin-bottom:10px;"></div>
        <div id="word-display"></div>
        <div id="keyboard" class="kb-container"></div>
    </div>

    <div id="screen-result" class="screen panel">
        <h1 id="res-status">RESULT</h1>
        <h2 id="res-word" style="color:var(--main)">正解: ---</h2>
        <div id="res-ranking"></div>
        <button onclick="location.reload()" class="btn btn-primary" style="margin-top:20px; width:100%;">ロビーに戻る</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWddxiv4O3gJW2Fyf2gGEwWs5dCiWuu7Y",
            authDomain: "airhockey-1e251.firebaseapp.com",
            projectId: "airhockey-1e251",
            databaseURL: "https://airhockey-1e251-default-rtdb.asia-southeast1.firebasedatabase.app",
            storageBucket: "airhockey-1e251.firebasestorage.app",
            messagingSenderId: "15014810791",
            appId: "1:15014810791:web:7dc84e7143d495cf97b782"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const dictionary = {
            "たべもの": ["おむらいす", "めろんぱん", "そふとくりーむ", "たこやき", "すぱげってぃ", "ぽてとふらい", "かれーらいす"],
            "どうぶつ": ["らいおん", "ちんぱんじー", "はむすたー", "ふらみんご", "きりん", "しか", "かんがるー"],
            "のりもの": ["しんかんせん", "へりこぷたー", "しょうぼうしゃ", "きゅうきゅうしゃ", "よっと"],
            "むし": ["かぶとむし", "あげはちょう", "てんとうむし", "かまきり", "くわがた"],
            "ポケモン": ["ぴかちゅう", "りざーどん", "いーぶい", "げっこうがー", "るかりお", "みゅうつー", "かびごん", "れっくうざ"],
            "ちめい": ["ほっかいどう", "とうきょう", "おおさか", "ふじさん", "おきなわ", "よこはま", "なごや", "きょうと"]
        };
        
        const kanaGroups = [
            { label: "あ行", chars: "あいうえお" }, { label: "か行", chars: "かきくけこ" },
            { label: "さ行", chars: "さしすせそ" }, { label: "た行", chars: "たちつてと" },
            { label: "な行", chars: "なにぬねの" }, { label: "は行", chars: "はひふへほ" },
            { label: "ま行", chars: "まみむめも" }, { label: "やわ行", chars: "やゆよわをんー" },
            { label: "ら行", chars: "らりるれろ" }, { label: "濁点・他", chars: "がぎぐげござじずぜぞだぢづでどばびぶべぼぱぴぷぺぽゃゅょっぁぃぅぇぉ" }
        ];

        let myId, myName, roomKey, isHost = false, myHearts = 17, myGuessed = [], currentData = null;

        // 画面切り替え
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // ロビー入り口
        document.getElementById('btn-create').onclick = () => entry(true);
        document.getElementById('btn-join').onclick = () => entry(false);

        function entry(host) {
            isHost = host;
            myName = document.getElementById('input-name').value || "プレイヤー";
            roomKey = "room_" + document.getElementById('input-room').value;
            myId = Math.random().toString(36).slice(2, 7);

            showScreen('screen-lobby');
            if(host) {
                document.querySelectorAll('.host-only').forEach(el => el.style.display = 'block');
                syncConfig(); // ホストは初期値を送信
            } else {
                document.getElementById('guest-view').style.display = 'block';
            }

            const pRef = ref(db, `rooms/${roomKey}/players/${myId}`);
            set(pRef, { name: myName, score: 0, guessedStr: "", host: host });
            onDisconnect(pRef).remove();

            onValue(ref(db, `rooms/${roomKey}`), (snap) => {
                const data = snap.val(); if(!data) return;
                currentData = data;
                const players = Object.values(data.players || {});
                document.getElementById('lobby-members').innerText = players.map(p => p.name).join(", ");
                
                if(data.config) {
                    document.getElementById('view-g').innerText = data.config.g;
                    document.getElementById('view-h').innerText = data.config.h;
                    document.getElementById('view-r').innerText = data.config.r;
                }
                if(data.status === "playing") initGame(data);
                if(data.status === "finished") showResult(data);
            });
        }

        // ホストの設定をFirebaseに同期
        function syncConfig() {
            if(!isHost) return;
            const config = {
                g: document.getElementById('select-g').value,
                h: parseInt(document.getElementById('select-h').value),
                r: parseInt(document.getElementById('select-r').value)
            };
            update(ref(db, `rooms/${roomKey}`), { config });
        }
        document.getElementById('select-g').onchange = syncConfig;
        document.getElementById('select-h').onchange = syncConfig;
        document.getElementById('select-r').onchange = syncConfig;

        // ゲーム開始
        document.getElementById('btn-start').onclick = () => {
            const conf = currentData.config;
            const target = dictionary[conf.g][Math.floor(Math.random() * dictionary[conf.g].length)];
            const allChars = kanaGroups.map(g => g.chars).join("").split("");
            let removable = allChars.filter(c => !target.includes(c));
            const removed = removable.sort(() => Math.random() - 0.5).slice(0, conf.r);

            update(ref(db, `rooms/${roomKey}`), {
                status: "playing", target, turnIdx: 0, wrongAll: [], 
                config: { ...conf, removed }
            });
        };

        function initGame(data) {
            showScreen('screen-game');
            myHearts = data.config.h;
            const kb = document.getElementById('keyboard');
            kb.innerHTML = "";
            kanaGroups.forEach(group => {
                const label = document.createElement("div");
                label.className = "key-group-label"; label.innerText = group.label;
                kb.appendChild(label);
                group.chars.split("").forEach(c => {
                    const k = document.createElement("div");
                    k.className = "key"; k.id = "k-" + c; k.innerText = c;
                    if(data.config.removed.includes(c)) k.classList.add("removed");
                    k.onclick = () => handleGuess(c);
                    kb.appendChild(k);
                });
            });
            renderUI(data);
        }

        function handleGuess(char) {
            const pList = Object.entries(currentData.players).map(([id, p]) => ({id, ...p}));
            if(pList[currentData.turnIdx].id !== myId) return;

            const btn = document.getElementById("k-"+char);
            if(btn.classList.contains("my-used") || btn.classList.contains("wrong-all")) return;
            btn.classList.add("my-used");

            if(currentData.target.includes(char)) {
                myGuessed.push(char);
            } else {
                myHearts--;
                const wa = currentData.wrongAll || [];
                if(!wa.includes(char)) wa.push(char);
                update(ref(db, `rooms/${roomKey}`), { wrongAll: wa });
            }

            update(ref(db, `rooms/${roomKey}/players/${myId}`), { 
                score: myGuessed.length, guessedStr: myGuessed.join(",") 
            });

            const next = (currentData.turnIdx + 1) % pList.length;
            update(ref(db, `rooms/${roomKey}`), { turnIdx: next });

            if(currentData.target.split("").every(c => myGuessed.includes(c)) || myHearts <= 0) {
                update(ref(db, `rooms/${roomKey}`), { status: "finished" });
            }
        }

        function renderUI(data) {
            const display = document.getElementById('word-display');
            display.innerHTML = "";
            data.target.split("").forEach(c => {
                const s = document.createElement("div"); s.className = "slot";
                if(myGuessed.includes(c)) s.innerText = c;
                display.appendChild(s);
            });

            if(data.wrongAll) data.wrongAll.forEach(c => document.getElementById("k-"+c)?.classList.add("wrong-all"));

            const pList = Object.entries(data.players).map(([id, p]) => ({id, ...p}));
            const isMy = (pList[data.turnIdx].id === myId);
            const msg = document.getElementById('turn-msg');
            msg.innerText = isMy ? "★ あなたの番です ★" : `${pList[data.turnIdx].name}の番...`;
            msg.className = isMy ? "my-turn-anim" : "";
            document.getElementById('heart-bar').innerText = "❤️".repeat(Math.max(0, myHearts));
        }

        function showResult(data) {
            showScreen('screen-result');
            document.getElementById('res-word').innerText = "正解: " + data.target;
            const area = document.getElementById('res-ranking');
            area.innerHTML = "";
            const sorted = Object.values(data.players).sort((a,b) => b.score - a.score);
            const winner = data.target.split("").every(c => sorted[0].guessedStr.split(",").includes(c));
            document.getElementById('res-status').innerText = (winner && sorted[0].name === myName) ? "🏆 YOU WIN! 🏆" : "💀 GAME OVER 💀";

            sorted.forEach((p, i) => {
                const pG = p.guessedStr.split(",");
                const progress = data.target.split("").map(c => pG.includes(c)?c:"_").join("");
                area.innerHTML += `
                    <div class="rank-row">
                        <span><b>${i+1}位: ${p.name}</b></span>
                        <span style="font-family:monospace; color:#666;">${progress}</span>
                        <span style="color:var(--main)">${p.score}字</span>
                    </div>`;
            });
        }
    </script>
</body>
</html>
