<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>コトバ・サバイバル Multi</title>
    <style>
        :root { --main: #4a90e2; --sub: #2ed573; --danger: #ff4757; }
        body { background: #f4f7f9; font-family: 'Hiragino Sans', sans-serif; margin: 0; text-align: center; }
        .panel { background: white; padding: 20px; border-radius: 15px; width: 92%; max-width: 500px; margin: 15px auto; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        
        /* ロビー */
        .member-list { text-align: left; background: #eee; padding: 10px; border-radius: 10px; margin: 10px 0; }
        .config-area { text-align: left; border-top: 1px solid #ddd; padding-top: 10px; }
        .config-area input { width: 60px; }

        /* ゲーム画面 */
        #turn-info { padding: 10px; font-weight: bold; border-radius: 10px; margin-bottom: 10px; }
        .active-turn { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        
        #word-display { display: flex; justify-content: center; gap: 5px; margin: 15px 0; flex-wrap: wrap; }
        .slot { width: 35px; height: 45px; border-bottom: 3px solid #ccc; font-size: 1.5rem; font-weight: bold; display: flex; align-items: center; justify-content: center; }

        /* 50音キーボード */
        #keyboard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; background: #ddd; padding: 5px; border-radius: 10px; }
        .key { aspect-ratio: 1.2; background: white; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; cursor: pointer; font-weight: bold; }
        .key.my-used { opacity: 0.3; pointer-events: none; }
        .key.wrong-all { background: var(--danger) !important; color: white; }
        .key.removed { background: #999 !important; color: #999; pointer-events: none; opacity: 0.5; }

        /* 結果画面 */
        #result-overlay { display: none; position: fixed; inset:0; background: rgba(0,0,0,0.9); color: white; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        button { padding: 12px 24px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .host-only { display: none; }
    </style>
</head>
<body>

    <div id="lobby" class="panel">
        <h2 id="lobby-title">ロビー</h2>
        <input type="text" id="nameInput" placeholder="なまえ" value="プレイヤー"><br><br>
        <input type="text" id="roomInput" placeholder="部屋ID" value="999"><br><br>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button id="createBtn" style="background:var(--main); color:white">部屋作成</button>
            <button id="joinBtn" style="background:var(--sub); color:white">参加する</button>
        </div>
        
        <div id="room-controls" style="display:none; margin-top:20px;">
            <div class="member-list">参加者: <span id="player-names">---</span></div>
            <div class="config-area">
                <p>ライフ: <span id="val-h">17</span> | 除外: <span id="val-r">0</span></p>
                <div class="host-only" id="host-tools">
                    ライフ設定: <input type="number" id="set-h" value="17"><br>
                    除外文字数: <input type="number" id="set-r" value="10"><br>
                    <button id="startBtn" style="background:orange; color:white; width:100%; margin-top:10px;">ゲーム開始！</button>
                </div>
            </div>
        </div>
    </div>

    <div id="game-screen" class="panel" style="display:none">
        <div id="turn-info">待機中...</div>
        <div id="heart-count">❤️❤️❤️</div>
        <div id="word-display"></div>
        <div id="keyboard"></div>
    </div>

    <div id="result-overlay">
        <h1 id="res-status"></h1>
        <p id="res-ans"></p>
        <button onclick="location.reload()" style="background:white; color:black">タイトルへ</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, push, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWddxiv4O3gJW2Fyf2gGEwWs5dCiWuu7Y",
            authDomain: "airhockey-1e251.firebaseapp.com",
            projectId: "airhockey-1e251",
            databaseURL: "https://airhockey-1e251-default-rtdb.asia-southeast1.firebasedatabase.app",
            storageBucket: "airhockey-1e251.firebasestorage.app",
            messagingSenderId: "15014810791",
            appId: "1:15014810791:web:7dc84e7143d495cf97b782"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const hiragana50 = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをんーがぎぐげござじずぜぞだぢづでどばびぶべぼぱぴぷぺぽゃゅょっぁぃぅぇぉ".split("");
        const words = ["らいおん", "しんかんせん", "ちゅうしゃじょう", "けーきたべたい", "ぷろぐらみんぐ"];
        
        let myId, myName, gameId, isHost = false, myRoleIdx;
        let myHearts = 17, myGuessed = [], currentTurnIdx = 0;
        let pList = [];

        // --- ロビー処理 ---
        document.getElementById("createBtn").onclick = () => entry(true);
        document.getElementById("joinBtn").onclick = () => entry(false);

        function entry(host) {
            isHost = host;
            myName = document.getElementById("nameInput").value;
            gameId = "multi_" + document.getElementById("roomInput").value;
            myId = Math.random().toString(36).slice(2, 7);
            
            document.getElementById("room-controls").style.display = "block";
            if(host) document.getElementById("host-tools").style.display = "block";

            const pRef = ref(db, `rooms/${gameId}/players/${myId}`);
            set(pRef, { name: myName, host: host });
            onDisconnect(pRef).remove();

            onValue(ref(db, `rooms/${gameId}`), (snap) => {
                const data = snap.val(); if(!data) return;
                pList = Object.entries(data.players || {}).map(([id, p]) => ({id, ...p}));
                document.getElementById("player-names").innerText = pList.map(p => p.name).join(", ");
                
                if(data.config) {
                    document.getElementById("val-h").innerText = data.config.h;
                    document.getElementById("val-r").innerText = data.config.r;
                    myHearts = data.config.h;
                }
                if(data.status === "playing") startGame(data);
            });
        }

        document.getElementById("startBtn").onclick = () => {
            const h = parseInt(document.getElementById("set-h").value);
            const r = parseInt(document.getElementById("set-r").value);
            const target = words[Math.floor(Math.random() * words.length)];
            
            // 除外文字作成
            let removable = hiragana50.filter(c => !target.split("").includes(c));
            removable.sort(() => Math.random() - 0.5);
            const removed = removable.slice(0, r);

            update(ref(db, `rooms/${gameId}`), {
                status: "playing",
                config: { h, r, removed },
                target: target,
                turnIdx: 0,
                wrongAll: []
            });
        };

        function startGame(data) {
            document.getElementById("lobby").style.display = "none";
            document.getElementById("game-screen").style.display = "block";
            myRoleIdx = pList.findIndex(p => p.id === myId);
            
            // キーボード生成
            const kb = document.getElementById("keyboard");
            kb.innerHTML = "";
            hiragana50.forEach(char => {
                const d = document.createElement("div");
                d.className = "key"; d.id = "k-" + char; d.innerText = char;
                if(data.config.removed.includes(char)) d.classList.add("removed");
                d.onclick = () => guess(char);
                kb.appendChild(d);
            });

            // リアルタイム同期
            onValue(ref(db, `rooms/${gameId}`), (snap) => {
                const d = snap.val();
                currentTurnIdx = d.turnIdx;
                const isMyTurn = (currentTurnIdx === myRoleIdx);
                const bar = document.getElementById("turn-info");
                bar.innerText = isMyTurn ? "★ あなたの番 ★" : `${pList[currentTurnIdx].name}の番...`;
                bar.className = isMyTurn ? "active-turn" : "";
                
                // 共通のハズレ文字を更新
                (d.wrongAll || []).forEach(c => document.getElementById("k-"+c).classList.add("wrong-all"));
                
                renderWord(d.target);
                document.getElementById("heart-count").innerText = "❤️".repeat(myHearts);
                
                // 勝利判定 (自分だけが見えている文字で判定)
                if(d.target.split("").every(c => myGuessed.includes(c))) end(true, d.target);
            });
        }

        function guess(char) {
            if(currentTurnIdx !== myRoleIdx) return;
            const btn = document.getElementById("k-" + char);
            btn.classList.add("my-used");

            const target = gameState.target || ""; // syncの問題回避
            const gameRef = ref(db, `rooms/${gameId}`);

            onValue(gameRef, (snap) => {
                const d = snap.val();
                if(d.target.includes(char)) {
                    myGuessed.push(char);
                } else {
                    myHearts--;
                    const wa = d.wrongAll || [];
                    if(!wa.includes(char)) wa.push(char);
                    update(gameRef, { wrongAll: wa });
                }
                const next = (d.turnIdx + 1) % pList.length;
                update(gameRef, { turnIdx: next });
                if(myHearts <= 0) end(false, d.target);
            }, {onlyOnce: true});
        }

        function renderWord(target) {
            const area = document.getElementById("word-display");
            area.innerHTML = "";
            target.split("").forEach(c => {
                const s = document.createElement("div");
                s.className = "slot";
                if(myGuessed.includes(c)) s.innerText = c;
                area.appendChild(s);
            });
        }

        function end(win, target) {
            document.getElementById("result-overlay").style.display = "flex";
            document.getElementById("res-status").innerText = win ? "🏆 YOU WIN! 🏆" : "💀 GAME OVER 💀";
            document.getElementById("res-ans").innerText = "正解: " + target;
        }
    </script>
</body>
</html>
