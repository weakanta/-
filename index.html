<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>コトバ・サバイバル v19</title>
    <style>
        :root { --main: #4a90e2; --sub: #2ed573; --danger: #ff4757; --bg: #f4f7f9; }
        body { background: var(--bg); font-family: sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: #333; }
        
        .screen { display: none; flex: 1; flex-direction: column; padding: 15px; box-sizing: border-box; }
        .active { display: flex; }
        .panel { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 10px; }

        /* エントリー・ロビー（大きく） */
        #screen-entry h1, #screen-lobby h2 { font-size: 2.2rem; color: var(--main); margin-bottom: 20px; text-align: center; }
        .input-big { width: 90%; padding: 15px; font-size: 1.2rem; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ccc; display: block; margin-left: auto; margin-right: auto; }
        .member-card { font-size: 1.4rem; font-weight: bold; padding: 15px; background: #eef2f7; border-radius: 10px; margin: 10px 0; text-align: center; }

        /* ゲーム表示 */
        .slot { width: 22px; height: 35px; border-bottom: 3px solid #ccc; font-size: 1.5rem; font-weight: bold; display: flex; align-items: center; justify-content: center; margin: 2px; }
        .turn-indicator { font-size: 1rem; font-weight: bold; padding: 8px; border-radius: 10px; border: 2px solid #ddd; margin-bottom: 10px; text-align: center; background: white; }

        /* 初期の6列キーボード（復活） */
        .kb-container { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; background: #cbd5e0; padding: 5px; border-radius: 10px; }
        .key { aspect-ratio: 1; background: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; 
               font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 2px 0 #a0aec0; }
        .key:active { transform: translateY(2px); box-shadow: none; }
        .key.my-correct { background: var(--sub) !important; color: white; box-shadow: none; }
        .key.wrong-all { background: var(--danger) !important; color: white; box-shadow: none; }
        .key.removed { background: #e2e8f0 !important; opacity: 0.2; pointer-events: none; }

        /* 進捗（コンパクト） */
        .prog-row { display: flex; align-items: center; gap: 5px; font-size: 0.8rem; justify-content: center; margin-bottom: 4px; }
        .p-dot { width: 8px; height: 8px; background: #ddd; border-radius: 2px; }
        .p-dot.filled { background: var(--sub); }

        /* 下部UI（チャット・スタンプ） */
        .bottom-ui { background: white; border-top: 2px solid #ddd; padding: 10px; }
        #chat-box { height: 70px; overflow-y: auto; text-align: left; font-size: 0.85rem; padding: 5px; background: #f8f9fa; border-radius: 8px; margin-bottom: 8px; border: 1px solid #eee; }
        .stamp-row { display: flex; justify-content: space-around; font-size: 1.8rem; margin-bottom: 10px; }
        .chat-row { display: flex; gap: 8px; }
        #chat-input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 8px 15px; font-size: 1rem; }

        .btn { padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .btn-primary { background: var(--main); color: white; }
        #stamp-popup { position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%) scale(0); background: white; padding: 15px 30px; border-radius: 50px; border: 4px solid var(--main); z-index: 9999; font-weight: bold; transition: 0.2s; pointer-events: none; font-size: 1.3rem; }
        #stamp-popup.show { transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>

    <div id="stamp-popup"></div>

    <div id="screen-entry" class="screen active">
        <div class="panel" style="margin-top: 40px;">
            <h1>コトバ・サバイバル</h1>
            <input type="text" id="input-name" class="input-big" placeholder="なまえを入力">
            <input type="text" id="input-room" class="input-big" placeholder="部屋ID(数字)" value="123">
            <div style="display:flex; gap:10px; justify-content:center;">
                <button id="btn-create" class="btn btn-primary" style="flex:1">部屋を作る</button>
                <button id="btn-join" class="btn btn-primary" style="flex:1; background:var(--sub)">参加する</button>
            </div>
        </div>
    </div>

    <div id="screen-lobby" class="screen">
        <div class="panel">
            <h2>LOBBY</h2>
            <div id="lobby-members"></div>
            <div class="host-only" style="display:none; margin-top:20px; border-top:1px solid #eee; padding-top:15px;">
                <label>ジャンル：</label>
                <select id="select-g" style="width:100%; padding:10px; font-size:1.1rem; margin:10px 0;"></select><br>
                <label>ライフ(ミス許容回数)：</label>
                <input type="number" id="select-h" value="17" style="width:70px; padding:8px; font-size:1.1rem;"><br><br>
                <button id="btn-start" class="btn btn-primary" style="width:100%; background:orange; font-size:1.4rem; height:60px;">ゲームを開始する！</button>
            </div>
            <p id="guest-msg" style="text-align:center; color:#666; font-size:1.2rem; margin-top:20px;">ホストの開始待ち...</p>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="panel" style="padding:10px; text-align:center;">
            <div id="turn-msg" class="turn-indicator">読み込み中...</div>
            <div id="word-display" style="display:flex; justify-content:center; flex-wrap:wrap; margin:10px 0;"></div>
            <div id="progress-area"></div>
            <div style="font-size:1rem; margin-top:5px;">❤️ ライフ: <span id="heart-count" style="font-weight:bold; color:var(--danger)"></span></div>
        </div>
        <div id="keyboard" class="kb-container"></div>
    </div>

    <div id="screen-result" class="screen">
        <div class="panel" style="text-align:center;">
            <h1 id="res-status" style="font-size:2.5rem;">RESULT</h1>
            <h2 id="res-word" style="color:var(--main); background:#eee; padding:15px; border-radius:10px;"></h2>
            <div id="res-ranking" style="text-align:left; margin:20px 0; font-size:1.2rem;"></div>
            <button onclick="location.reload()" class="btn btn-primary" style="width:100%; height:60px;">トップに戻る</button>
        </div>
    </div>

    <div id="common-ui" class="bottom-ui" style="display:none;">
        <div id="chat-box"></div>
        <div class="stamp-row">
            <span class="st" data-val="👏">👏</span>
            <span class="st" data-val="👍">👍</span>
            <span class="st" data-val="😮">😮</span>
            <span class="st" data-val="😭">😭</span>
            <span class="st" data-val="💢">💢</span>
        </div>
        <div class="chat-row">
            <input type="text" id="chat-input" placeholder="メッセージ...">
            <button id="btn-send-chat" class="btn btn-primary" style="padding:0 20px;">送信</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, onDisconnect, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { dictionary } from "./questions.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWddxiv4O3gJW2Fyf2gGEwWs5dCiWuu7Y",
            authDomain: "airhockey-1e251.firebaseapp.app",
            projectId: "airhockey-1e251",
            databaseURL: "https://airhockey-1e251-default-rtdb.asia-southeast1.firebasedatabase.app",
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let audioCtx;
        function playTone(f, d, t="sine") {
            try {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.type = t; o.frequency.value = f; g.gain.setValueAtTime(0.06, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
                o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
            } catch(e) {}
        }

        const kanaList = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをんーがぎぐげござじずぜぞだぢづでどばびぶべぼぱぴぷぺぽゃゅょっぁぃぅぇぉゔ".split("");

        let myId, myName, roomKey, isHost = false, myHearts = 17, myGuessed = [], currentData = null;
        let lastTurnId = "", lastStatus = "entry", lastStampTime = 0;

        // ボタンのクリックイベントをここで確実に設定
        document.getElementById('btn-create').addEventListener('click', () => entry(true));
        document.getElementById('btn-join').addEventListener('click', () => entry(false));
        document.getElementById('btn-send-chat').addEventListener('click', sendChat);
        document.querySelectorAll('.st').forEach(s => s.addEventListener('click', (e) => sendStamp(e.target.dataset.val)));

        function entry(host) {
            isHost = host;
            myName = document.getElementById('input-name').value || "プレイヤー" + Math.floor(Math.random()*100);
            roomKey = "room_" + (document.getElementById('input-room').value || "123");
            myId = Math.random().toString(36).slice(2, 7);
            
            showScreen('screen-lobby');
            document.getElementById('common-ui').style.display = 'block';
            
            const roomRef = ref(db, `rooms/${roomKey}`);
            const pRef = ref(db, `rooms/${roomKey}/players/${myId}`);

            if(host) {
                set(roomRef, { status: "lobby", config: { g: Object.keys(dictionary)[0], h: 17 }, lastStamp: {time:0} });
                document.querySelectorAll('.host-only').forEach(e => e.style.display = 'block');
                const sel = document.getElementById('select-g');
                Object.keys(dictionary).forEach(g => { const o = document.createElement('option'); o.value=g; o.innerText=g; sel.appendChild(o); });
                document.getElementById('btn-start').onclick = startGame;
            }

            set(pRef, { name: myName, score: 0, guessedStr: "", color: "#4a90e2" });
            onDisconnect(pRef).remove();

            onValue(roomRef, (snap) => {
                const data = snap.val(); if(!data) return;
                currentData = data;
                const players = Object.entries(data.players || {}).map(([id, p]) => ({id, ...p}));
                if(data.status === "lobby") document.getElementById('lobby-members').innerHTML = players.map(p => `<div class="member-card">${p.name}</div>`).join("");
                if(data.status === "playing") {
                    if(data.lastStamp?.time > lastStampTime) { lastStampTime = data.lastStamp.time; showStampPopup(data.lastStamp); playTone(600, 0.1); }
                    const curP = players[data.turnIdx];
                    if(curP?.id !== lastTurnId) { lastTurnId = curP?.id; if(lastTurnId === myId) playTone(880, 0.08, "triangle"); }
                }
                if(data.status !== lastStatus) {
                    lastStatus = data.status;
                    if(data.status === "playing") initGame(data);
                    else if(data.status === "finished") showResult(data, players);
                } else if(data.status === "playing") renderUI(data);
            });

            onValue(ref(db, `rooms/${roomKey}/chats`), (snap) => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                const chats = snap.val();
                if(chats) {
                    Object.values(chats).slice(-20).forEach(c => {
                        const d = document.createElement('div'); d.innerHTML = `<b>${c.sender}:</b> ${c.msg}`; box.appendChild(d);
                    });
                    box.scrollTop = box.scrollHeight;
                }
            });
        }

        function sendChat() {
            const i = document.getElementById('chat-input'); if(!i.value) return;
            push(ref(db, `rooms/${roomKey}/chats`), { sender: myName, msg: i.value, time: Date.now() });
            i.value = "";
        }

        function sendStamp(emoji) {
            update(ref(db, `rooms/${roomKey}`), { lastStamp: { emoji, sender: myName, time: Date.now() } });
        }

        function showStampPopup(s) {
            const p = document.getElementById('stamp-popup');
            p.innerText = `${s.sender}: ${s.emoji}`; p.classList.add('show');
            setTimeout(() => p.classList.remove('show'), 1200);
        }

        function startGame() {
            const g = document.getElementById('select-g').value;
            const target = dictionary[g][Math.floor(Math.random() * dictionary[g].length)];
            const removed = kanaList.filter(c => !target.includes(c)).sort(() => Math.random() - 0.5).slice(0, 10);
            update(ref(db, `rooms/${roomKey}`), { status: "playing", target, turnIdx: 0, wrongAll: [], config: { g, h: parseInt(document.getElementById('select-h').value), removed } });
        }

        function initGame(data) {
            myGuessed = []; myHearts = data.config.h; showScreen('screen-game');
            const kb = document.getElementById('keyboard'); kb.innerHTML = "";
            kanaList.forEach(c => {
                const k = document.createElement("div"); k.className = "key"; k.id = "k-" + c; k.innerText = c;
                if(data.config.removed?.includes(c)) k.classList.add("removed");
                k.onclick = () => handleGuess(c); kb.appendChild(k);
            });
        }

        function handleGuess(char) {
            const pList = Object.entries(currentData.players).map(([id, p]) => ({id, ...p}));
            if(pList[currentData.turnIdx].id !== myId) return;
            const btn = document.getElementById("k-"+char);
            if(btn.classList.contains('wrong-all') || btn.classList.contains('my-correct')) return;
            
            if(currentData.target.includes(char)) {
                myGuessed.push(char); playTone(1200, 0.1);
                update(ref(db, `rooms/${roomKey}/players/${myId}`), { score: myGuessed.length, guessedStr: myGuessed.join(",") });
            } else {
                myHearts--; const wa = currentData.wrongAll || []; wa.push(char);
                update(ref(db, `rooms/${roomKey}`), { wrongAll: wa });
                playTone(200, 0.2, "square");
            }
            update(ref(db, `rooms/${roomKey}`), { turnIdx: (currentData.turnIdx + 1) % pList.length });
            if(currentData.target.split("").every(c => myGuessed.includes(c)) || myHearts <= 0) {
                setTimeout(() => update(ref(db, `rooms/${roomKey}`), { status: "finished" }), 600);
            }
        }

        function renderUI(data) {
            const display = document.getElementById('word-display'); display.innerHTML = "";
            data.target.split("").forEach(c => {
                const s = document.createElement("div"); s.className = "slot";
                s.innerText = myGuessed.includes(c) ? c : ""; display.appendChild(s);
            });
            const progArea = document.getElementById('progress-area'); progArea.innerHTML = "";
            Object.entries(data.players).forEach(([pid, p]) => {
                if(pid === myId) return;
                const row = document.createElement('div'); row.className = "prog-row";
                row.innerHTML = `<span style="width:50px; text-align:right; overflow:hidden;">${p.name.slice(0,3)}:</span>`;
                data.target.split("").forEach(char => {
                    const dot = document.createElement('div');
                    dot.className = "p-dot" + ((p.guessedStr || "").includes(char) ? " filled" : "");
                    row.appendChild(dot);
                });
                progArea.appendChild(row);
            });
            document.querySelectorAll('.key').forEach(k => k.classList.remove('my-correct', 'wrong-all'));
            if(data.wrongAll) data.wrongAll.forEach(c => document.getElementById("k-"+c)?.classList.add('wrong-all'));
            myGuessed.forEach(c => document.getElementById("k-"+c)?.classList.add('my-correct'));
            const curP = Object.entries(data.players).map(([id, p]) => ({id, ...p}))[data.turnIdx];
            const msg = document.getElementById('turn-msg');
            msg.innerText = (curP?.id === myId) ? "★ あなたの番です ★" : `${curP?.name}の番...`;
            msg.style.color = (curP?.id === myId) ? "var(--sub)" : "#888";
            document.getElementById('heart-count').innerText = Math.max(0, myHearts);
        }

        function showResult(data, players) {
            showScreen('screen-result');
            document.getElementById('res-word').innerText = "正解: " + data.target;
            const area = document.getElementById('res-ranking'); area.innerHTML = "";
            const sorted = players.sort((a,b) => b.score - a.score);
            document.getElementById('res-status').innerText = (sorted[0].id === myId) ? "👑 WINNER!" : "FINISH";
            sorted.forEach((p, i) => area.innerHTML += `<div style="padding:15px; border-bottom:1px solid #eee;"><b>${i+1}位: ${p.name}</b> (${p.score}文字)</div>`);
        }
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
