<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>コトバ・サバイバル Extreme</title>
    <style>
        :root { --p1: #4a90e2; --p2: #ff4757; --bg: #f0f2f5; }
        body { background: var(--bg); font-family: 'Hiragino Sans', sans-serif; text-align: center; margin: 0; touch-action: manipulation; }
        .panel { background: white; padding: 20px; border-radius: 20px; width: 92%; max-width: 480px; margin: 15px auto; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        
        /* ターン表示 */
        #turn-bar { padding: 10px; border-radius: 12px; font-weight: bold; margin-bottom: 15px; transition: 0.3s; }
        .my-turn { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .opp-turn { background: #e2e3e5; color: #383d41; border: 2px solid #d6d8db; }

        /* 単語スロット */
        #word-display { display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; margin: 20px 0; min-height: 60px; }
        .slot { width: 38px; height: 48px; border-bottom: 3px solid #cbd5e0; font-size: 1.6rem; font-weight: bold; display: flex; align-items: center; justify-content: center; }

        /* キーボード */
        #keyboard { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; }
        .key { aspect-ratio: 1; border: 1px solid #ddd; border-radius: 5px; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; background: #fff; cursor: pointer; }
        .key.my-guessed { background: #333 !important; color: #333 !important; opacity: 0.2; pointer-events: none; }
        .key.correct-hit { background: #2ed573 !important; color: white !important; }

        /* リザルト画面 */
        #result-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); color: white; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .result-box { background: white; color: #333; padding: 30px; border-radius: 20px; width: 80%; }
        .res-btn { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        #lobby { display: block; }
        #game-screen { display: none; }
        #hearts { font-size: 1.2rem; color: var(--p2); margin: 5px; }
        .genre-tag { font-size: 0.8rem; background: #eee; padding: 2px 8px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="lobby" class="panel">
        <h2 style="color:var(--p1)">コトバ・サバイバル</h2>
        <input type="text" id="nameInput" placeholder="なまえ" value="プレイヤー1" style="margin-bottom:10px; padding:10px; width:80%"><br>
        <input type="text" id="roomInput" placeholder="部屋番号" value="1234" style="margin-bottom:10px; padding:10px; width:80%"><br>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button id="createBtn" style="padding:15px 30px; background:var(--p1); color:white; border:none; border-radius:10px;">ルーム作成</button>
            <button id="joinBtn" style="padding:15px 30px; background:#2ed573; color:white; border:none; border-radius:10px;">参加する</button>
        </div>
    </div>

    <div id="game-screen" class="panel">
        <div id="turn-bar">対戦相手を待機中...</div>
        <div id="hearts">❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️</div>
        <div id="genre-display" class="genre-tag">ジャンル: ???</div>
        <div id="word-display"></div>
        <div id="keyboard"></div>
    </div>

    <div id="result-screen">
        <div class="result-box">
            <h1 id="result-title">Victory!</h1>
            <p id="result-word">正解: ---</p>
            <button class="res-btn" style="background:var(--p1); color:white" onclick="location.reload()">もう一度あそぶ</button>
            <button class="res-btn" style="background:#eee" onclick="location.reload()">ロビーへ戻る</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWddxiv4O3gJW2Fyf2gGEwWs5dCiWuu7Y",
            authDomain: "airhockey-1e251.firebaseapp.com",
            projectId: "airhockey-1e251",
            databaseURL: "https://airhockey-1e251-default-rtdb.asia-southeast1.firebasedatabase.app",
            storageBucket: "airhockey-1e251.firebasestorage.app",
            messagingSenderId: "15014810791",
            appId: "1:15014810791:web:7dc84e7143d495cf97b782"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- 単語データ ---
        const dictionary = {
            "たべもの": ["おむらいす", "ぷりん", "ぎゅうにゅう", "そふとくりーむ", "おにぎり", "めろんぱん", "たこやき"],
            "どうぶつ": ["らいおん", "ぞう", "きりん", "きょうりゅう", "ちんぱんじー", "ぺんぎん", "はむすたー"],
            "のりもの": ["しんかんせん", "へりこぷたー", "しょうぼうしゃ", "ぱとかー", "じてんしゃ"],
            "むし": ["かぶとむし", "くわがた", "あげはちょう", "てんとうむし", "かまきり", "せみ"]
        };

        const fullAlpha = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをんがぎぐげござじずぜぞだぢづでどばびぶべぼぱぴぷぺぽゃゅょっぁぃぅぇぉ".split("");

        let myRole, gameId, hearts = 17;
        let gameState = {};

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function play(f, d) {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        document.getElementById("createBtn").onclick = () => start("p1");
        document.getElementById("joinBtn").onclick = () => start("p2");

        function start(role) {
            audioCtx.resume();
            myRole = role;
            gameId = "room_" + document.getElementById("roomInput").value;
            document.getElementById("lobby").style.display = "none";
            document.getElementById("game-screen").style.display = "block";

            if(role === "p1") {
                const genres = Object.keys(dictionary);
                const genre = genres[Math.floor(Math.random() * genres.length)];
                const target = dictionary[genre][Math.floor(Math.random() * dictionary[genre].length)];
                set(ref(db, `games/${gameId}`), {
                    target: target, genre: genre, turn: "p1", guessed: [], players: { p1: "P1" }
                });
            } else {
                update(ref(db, `games/${gameId}/players`), { p2: "P2" });
            }
            init();
        }

        function init() {
            const kb = document.getElementById("keyboard");
            fullAlpha.forEach(char => {
                const b = document.createElement("div");
                b.className = "key"; b.id = "key-" + char; b.innerText = char;
                b.onclick = () => guess(char);
                kb.appendChild(b);
            });

            onValue(ref(db, `games/${gameId}`), (snap) => {
                const data = snap.val(); if(!data) return;
                gameState = data;
                
                document.getElementById("genre-display").innerText = "ジャンル: " + data.genre;
                const display = document.getElementById("word-display");
                display.innerHTML = "";
                data.target.split("").forEach(char => {
                    const s = document.createElement("div");
                    s.className = "slot";
                    if(data.guessed.includes(char)) {
                        s.innerText = char;
                        if (fullAlpha.includes(char)) document.getElementById("key-" + char).classList.add("correct-hit");
                    }
                    display.appendChild(s);
                });

                const bar = document.getElementById("turn-bar");
                if(!data.players.p2) {
                    bar.innerText = "相手を待っています...";
                } else {
                    const isMy = (data.turn === myRole);
                    bar.innerText = isMy ? "★ あなたの番 ★" : "相手の番です...";
                    bar.className = isMy ? "my-turn" : "opp-turn";
                }
                
                checkEnd(data);
            });
        }

        function guess(char) {
            if(gameState.turn !== myRole || !gameState.players.p2) return;
            const btn = document.getElementById("key-" + char);
            btn.classList.add("my-guessed");

            let newGuessed = gameState.guessed || [];
            if(gameState.target.includes(char)) {
                play(800, 0.2);
                if(!newGuessed.includes(char)) newGuessed.push(char);
            } else {
                play(200, 0.3);
                hearts--;
                document.getElementById("hearts").innerText = "❤️".repeat(hearts);
            }

            const next = (myRole === "p1") ? "p2" : "p1";
            update(ref(db, `games/${gameId}`), { guessed: newGuessed, turn: next });
        }

        function checkEnd(data) {
            const win = data.target.split("").every(c => data.guessed.includes(c));
            if(win || hearts <= 0) {
                document.getElementById("result-screen").style.display = "flex";
                document.getElementById("result-title").innerText = win ? "🏆 YOU WIN! 🏆" : "💀 GAME OVER 💀";
                document.getElementById("result-word").innerText = "正解は: " + data.target;
            }
        }
    </script>
</body>
</html>
