<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>コトバ・サバイバル v18</title>
    <style>
        :root { --main: #4a90e2; --sub: #2ed573; --danger: #ff4757; --bg: #f4f7f9; }
        body { background: var(--bg); font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .screen { display: none; flex: 1; flex-direction: column; padding: 8px; box-sizing: border-box; }
        .active { display: flex; }
        .panel { background: white; border-radius: 12px; padding: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); margin-bottom: 8px; }

        /* ロビー（デカく） */
        #screen-lobby h2 { font-size: 2.2rem; color: var(--main); margin: 10px 0; }
        .member-card { font-size: 1.3rem; font-weight: bold; padding: 12px; background: white; border: 2px solid #ddd; border-radius: 10px; margin: 8px 0; }

        /* ゲーム表示 */
        .slot { width: 22px; height: 32px; border-bottom: 3px solid #ccc; font-size: 1.3rem; font-weight: bold; display: flex; align-items: center; justify-content: center; margin: 1px; }
        .turn-indicator { font-size: 0.9rem; font-weight: bold; padding: 6px; border-radius: 8px; border: 2px solid #eee; margin-bottom: 5px; background: white; }

        /* 10列キーボード（復活＆文字デカ） */
        .kb-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; background: #e2e8f0; padding: 3px; border-radius: 8px; }
        .key { aspect-ratio: 0.85; background: white; border-radius: 4px; display: flex; align-items: center; justify-content: center; 
               font-size: 1.1rem; font-weight: 900; cursor: pointer; box-shadow: 0 1px 0 #cbd5e0; color: #333; }
        .key:active { transform: translateY(1px); box-shadow: none; }
        .key.my-correct { background: var(--sub) !important; color: white; box-shadow: none; }
        .key.wrong-all { background: var(--danger) !important; color: white; box-shadow: none; }
        .key.removed { background: #cbd5e0 !important; opacity: 0.2; pointer-events: none; }

        /* 進捗（コンパクト） */
        .prog-row { display: flex; align-items: center; gap: 4px; font-size: 0.7rem; justify-content: center; margin-bottom: 2px; }
        .p-dot { width: 7px; height: 7px; background: #ddd; border-radius: 50%; }
        .p-dot.filled { background: var(--sub); }

        /* 下部UI（チャット・スタンプ固定） */
        .bottom-ui { background: white; border-top: 1px solid #ddd; padding: 6px; }
        #chat-box { height: 60px; overflow-y: auto; text-align: left; font-size: 0.8rem; padding: 4px; background: #f8f9fa; border-radius: 8px; margin-bottom: 4px; border: 1px solid #eee; }
        .stamp-row { display: flex; justify-content: space-around; font-size: 1.5rem; margin-bottom: 6px; }
        .chat-row { display: flex; gap: 4px; }
        #chat-input { flex: 1; border: 1px solid #ddd; border-radius: 15px; padding: 4px 12px; font-size: 0.9rem; }

        .btn { padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-primary { background: var(--main); color: white; }
        #stamp-popup { position: fixed; top: 25%; left: 50%; transform: translate(-50%, -50%) scale(0); background: white; padding: 12px 24px; border-radius: 40px; border: 3px solid var(--main); z-index: 9999; font-weight: bold; transition: 0.2s; pointer-events: none; }
        #stamp-popup.show { transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>

    <div id="stamp-popup"></div>

    <div id="screen-entry" class="screen active">
        <div class="panel" style="margin-top: 30px; text-align: center;">
            <h1 style="color:var(--main); margin-bottom: 20px;">コトバ・サバイバル</h1>
            <input type="text" id="input-name" placeholder="なまえ" value="プレイヤー" style="width:80%; padding:12px; font-size:1.1rem; margin-bottom:10px;"><br>
            <input type="text" id="input-room" placeholder="部屋ID" value="123" style="width:80%; padding:12px; font-size:1.1rem; margin-bottom:20px;"><br>
            <button id="btn-create" class="btn btn-primary" style="width:45%">部屋を作る</button>
            <button id="btn-join" class="btn btn-primary" style="width:45%; background:var(--sub)">参加する</button>
        </div>
    </div>

    <div id="screen-lobby" class="screen">
        <div class="panel" style="text-align: center;">
            <h2>LOBBY</h2>
            <div id="lobby-members"></div>
            <div class="host-only" style="display:none; margin-top:15px; border-top:1px solid #eee; padding-top:10px;">
                ジャンル: <select id="select-g" style="padding:8px; width:100%; margin:8px 0;"></select><br>
                ライフ: <input type="number" id="select-h" value="17" style="width:60px; padding:8px;"><br><br>
                <button id="btn-start" class="btn btn-primary" style="width:100%; font-size:1.4rem; background:orange;">ゲーム開始！</button>
            </div>
            <p id="guest-msg" style="color:#666;">ホストの開始を待っています...</p>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="panel" style="padding:8px; text-align: center;">
            <div id="turn-msg" class="turn-indicator">待機中</div>
            <div id="word-display" style="display:flex; justify-content:center; flex-wrap:wrap; margin:8px 0;"></div>
            <div id="progress-area"></div>
            <div style="font-size:0.85rem; margin-top:4px;">❤️ ライフ: <span id="heart-count" style="color:var(--danger); font-weight:bold;"></span></div>
        </div>
        <div id="keyboard" class="kb-container"></div>
    </div>

    <div id="screen-result" class="screen">
        <div class="panel" style="text-align: center;">
            <h1 id="res-status" style="font-size:2.2rem;">RESULT</h1>
            <h2 id="res-word" style="color:var(--main); background:#f0f0f0; padding:10px; border-radius:8px;"></h2>
            <div id="res-ranking" style="text-align:left; margin:15px 0;"></div>
            <button onclick="location.reload()" class="btn btn-primary" style="width:100%; font-size:1.2rem;">タイトルへ</button>
        </div>
    </div>

    <div id="common-ui" class="bottom-ui" style="display:none;">
        <div id="chat-box"></div>
        <div class="stamp-row">
            <span onclick="sendStamp('👏')" style="cursor:pointer">👏</span>
            <span onclick="sendStamp('👍')" style="cursor:pointer">👍</span>
            <span onclick="sendStamp('😮')" style="cursor:pointer">😮</span>
            <span onclick="sendStamp('😭')" style="cursor:pointer">😭</span>
            <span onclick="sendStamp('💢')" style="cursor:pointer">💢</span>
        </div>
        <div class="chat-row">
            <input type="text" id="chat-input" placeholder="メッセージ...">
            <button onclick="sendChat()" class="btn btn-primary" style="padding:0 12px;">送信</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, onDisconnect, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { dictionary } from "./questions.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWddxiv4O3gJW2Fyf2gGEwWs5dCiWuu7Y",
            authDomain: "airhockey-1e251.firebaseapp.app",
            projectId: "airhockey-1e251",
            databaseURL: "https://airhockey-1e251-default-rtdb.asia-southeast1.firebasedatabase.app",
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let audioCtx;
        function playTone(f, d, t="sine") {
            try {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.type = t; o.frequency.value = f; g.gain.setValueAtTime(0.06, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
                o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
            } catch(e) {}
        }

        const kanaList = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをんーがぎぐげござじずぜぞだぢづでどばびぶべぼぱぴぷぺぽゃゅょっぁぃぅぇぉゔ".split("");

        let myId, myName, roomKey, isHost = false, myHearts = 17, myGuessed = [], currentData = null;
        let lastTurnId = "", lastStatus = "entry", lastStampTime = 0;

        const entry = (host) => {
            isHost = host; myName = document.getElementById('input-name').value || "ななし";
            roomKey = "room_" + (document.getElementById('input-room').value || "123");
            myId = Math.random().toString(36).slice(2, 7);
            showScreen('screen-lobby');
            document.getElementById('common-ui').style.display = 'block';
            if(host) document.querySelectorAll('.host-only').forEach(e => e.style.display = 'block');
            
            const roomRef = ref(db, `rooms/${roomKey}`);
            const pRef = ref(db, `rooms/${roomKey}/players/${myId}`);
            if(host) {
                set(roomRef, { status: "lobby", config: { g: Object.keys(dictionary)[0], h: 17 }, lastStamp: {time:0} });
                const sel = document.getElementById('select-g');
                Object.keys(dictionary).forEach(g => { const o = document.createElement('option'); o.value=g; o.innerText=g; sel.appendChild(o); });
            }
            set(pRef, { name: myName, score: 0, guessedStr: "", color: "#4a90e2" });
            onDisconnect(pRef).remove();

            onValue(roomRef, (snap) => {
                const data = snap.val(); if(!data) return;
                currentData = data;
                const players = Object.entries(data.players || {}).map(([id, p]) => ({id, ...p}));
                if(data.status === "lobby") document.getElementById('lobby-members').innerHTML = players.map(p => `<div class="member-card">${p.name}</div>`).join("");
                
                if(data.status === "playing") {
                    if(data.lastStamp?.time > lastStampTime) {
                        lastStampTime = data.lastStamp.time;
                        showStampPopup(data.lastStamp);
                        playTone(600, 0.1);
                    }
                    const curP = players[data.turnIdx];
                    if(curP?.id !== lastTurnId) {
                        lastTurnId = curP?.id;
                        if(lastTurnId === myId) playTone(880, 0.08, "triangle");
                    }
                }
                if(data.status !== lastStatus) {
                    lastStatus = data.status;
                    if(data.status === "playing") initGame(data);
                    else if(data.status === "finished") showResult(data, players);
                } else if(data.status === "playing") renderUI(data);
            });

            onValue(ref(db, `rooms/${roomKey}/chats`), (snap) => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                const chats = snap.val();
                if(chats) {
                    Object.values(chats).slice(-20).forEach(c => {
                        const d = document.createElement('div'); d.innerHTML = `<b>${c.sender}:</b> ${c.msg}`; box.appendChild(d);
                    });
                    box.scrollTop = box.scrollHeight;
                }
            });
        };

        window.sendChat = () => {
            const i = document.getElementById('chat-input'); if(!i.value) return;
            push(ref(db, `rooms/${roomKey}/chats`), { sender: myName, msg: i.value, time: Date.now() });
            i.value = "";
        };

        window.sendStamp = (emoji) => {
            update(ref(db, `rooms/${roomKey}`), { lastStamp: { emoji, sender: myName, time: Date.now() } });
        };

        function showStampPopup(s) {
            const p = document.getElementById('stamp-popup');
            p.innerText = `${s.sender}: ${s.emoji}`; p.classList.add('show');
            setTimeout(() => p.classList.remove('show'), 1200);
        }

        document.getElementById('btn-create').onclick = () => entry(true);
        document.getElementById('btn-join').onclick = () => entry(false);
        document.getElementById('btn-start').onclick = () => {
            const g = document.getElementById('select-g').value;
            const target = dictionary[g][Math.floor(Math.random() * dictionary[g].length)];
            const removed = kanaList.filter(c => !target.includes(c)).sort(() => Math.random() - 0.5).slice(0, 10);
            update(ref(db, `rooms/${roomKey}`), { status: "playing", target, turnIdx: 0, wrongAll: [], config: { g, h: parseInt(document.getElementById('select-h').value), removed } });
        };

        function initGame(data) {
            myGuessed = []; myHearts = data.config.h; showScreen('screen-game');
            const kb = document.getElementById('keyboard'); kb.innerHTML = "";
            kanaList.forEach(c => {
                const k = document.createElement("div"); k.className = "key"; k.id = "k-" + c; k.innerText = c;
                if(data.config.removed?.includes(c)) k.classList.add("removed");
                k.onclick = () => handleGuess(c); kb.appendChild(k);
            });
        }

        function handleGuess(char) {
            const pList = Object.entries(currentData.players).map(([id, p]) => ({id, ...p}));
            if(pList[currentData.turnIdx].id !== myId) return;
            const btn = document.getElementById("k-"+char);
            if(btn.classList.contains('wrong-all') || btn.classList.contains('my-correct')) return;
            
            if(currentData.target.includes(char)) {
                myGuessed.push(char); playTone(1200, 0.1);
                update(ref(db, `rooms/${roomKey}/players/${myId}`), { score: myGuessed.length, guessedStr: myGuessed.join(",") });
            } else {
                myHearts--; const wa = currentData.wrongAll || []; wa.push(char);
                update(ref(db, `rooms/${roomKey}`), { wrongAll: wa });
                playTone(200, 0.2, "square");
            }
            update(ref(db, `rooms/${roomKey}`), { turnIdx: (currentData.turnIdx + 1) % pList.length });
            if(currentData.target.split("").every(c => myGuessed.includes(c)) || myHearts <= 0) {
                setTimeout(() => update(ref(db, `rooms/${roomKey}`), { status: "finished" }), 600);
            }
        }

        function renderUI(data) {
            const display = document.getElementById('word-display'); display.innerHTML = "";
            data.target.split("").forEach(c => {
                const s = document.createElement("div"); s.className = "slot";
                s.innerText = myGuessed.includes(c) ? c : ""; display.appendChild(s);
            });
            const progArea = document.getElementById('progress-area'); progArea.innerHTML = "";
            Object.entries(data.players).forEach(([pid, p]) => {
                if(pid === myId) return;
                const row = document.createElement('div'); row.className = "prog-row";
                row.innerHTML = `<span style="width:50px; text-align:right;">${p.name.slice(0,3)}:</span>`;
                data.target.split("").forEach(char => {
                    const dot = document.createElement('div');
                    dot.className = "p-dot" + ((p
