<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>コトバ・サバイバル v38.17</title>
    <style>
        :root { --main: #4a90e2; --sub: #2ed573; --danger: #ff4757; --bg: #f4f7f9; }
        body { background: var(--bg); font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; text-align: center; color: #333; overflow-x: hidden; touch-action: manipulation; }
        
        .game-wrapper { display: flex; flex-direction: column; gap: 10px; padding: 10px; max-width: 1200px; margin: 0 auto; }
        
        @media (min-width: 900px) or (orientation: landscape) {
            .game-wrapper { flex-direction: row; justify-content: center; align-items: flex-start; }
            .side-panel { width: 200px; position: sticky; top: 10px; }
            .main-column { flex: 1; max-width: 600px; }
            .kb-container { grid-template-columns: repeat(10, 1fr) !important; }
        }

        .panel { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); box-sizing: border-box; margin-bottom: 10px; position: relative; }
        .screen { display: none; }
        .active { display: block; }
        
        #screen-entry input[type="text"] { padding: 12px; font-size: 1rem; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        .btn { padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; width: 100%; box-sizing: border-box; }
        .btn-primary { background: var(--main); color: white; box-shadow: 0 4px 0 #357abd; }
        .btn-host { background: orange; color: white; margin-top: 8px; box-shadow: 0 4px 0 #d35400; }
        .btn-cpu { background: #8e44ad; color: white; margin-top: 8px; padding: 10px; }

        .word-slot { width: 8vw; max-width: 40px; height: 50px; border-bottom: 3px solid #4a90e2; margin: 2px; font-size: 1.5rem; font-weight: 900; display: flex; align-items: center; justify-content: center; color: #222; }

        .kb-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; background: #e2e8f0; padding: 8px; border-radius: 12px; }
        .key { aspect-ratio: 1; background: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; box-shadow: 0 2px 0 #cbd5e0; font-size: 0.9rem; }
        .key.correct { background: #bdc3c7 !important; color: #7f8c8d; box-shadow: none; pointer-events: none; opacity: 0.5; }
        .key.wrong { background: var(--danger) !important; color: white; box-shadow: none; pointer-events: none; opacity: 0.3; }
        .kb-disabled { opacity: 0.5; pointer-events: none; filter: grayscale(0.5); }

        .progress-item { background: #f8f9fa; padding: 6px 10px; border-radius: 10px; margin-bottom: 4px; text-align: left; font-size: 0.8rem; border-left: 4px solid transparent; }
        .status-badge { font-size: 0.6rem; padding: 1px 4px; border-radius: 3px; margin-left: 4px; font-weight: bold; }
        .alive { background: #d1f7e4; color: #15ad5c; }
        .dead { background: #ffe0e3; color: #ff4757; }

        #chat-box { height: 150px; overflow-y: auto; text-align: left; font-size: 0.85rem; background: #f8f9fa; border-radius: 10px; padding: 10px; border: 1px solid #eee; margin-bottom: 8px; }
        #chat-input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 0.9rem; }

        .stamp-btn { font-size: 1.5rem; height: 50px; cursor: pointer; border: none; background: #f0f0f0; border-radius: 12px; }

        /* スタンプの緩急アニメーション */
        #toast { position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%) scale(0); background: rgba(0,0,0,0.9); color: white; padding: 15px 25px; border-radius: 15px; z-index: 9999; transition: 0.3s; pointer-events: none; font-weight: bold; font-size: 1rem; }
        .floating-stamp { position: fixed; background: white; padding: 8px 15px; border-radius: 30px; border: 3px solid var(--main); z-index: 999; font-weight: bold; font-size: 1rem; pointer-events: none; animation: popBounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; transition: transform 0.3s ease, opacity 0.3s ease; }
        .floating-stamp.shrink { transform: scale(0); opacity: 0; }
        @keyframes popBounce { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        #toast.show { transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>

    <div id="toast"></div>
    <div id="stamp-container"></div>

    <div class="game-wrapper">
        <div class="side-panel" id="side-left" style="display:none;">
            <div class="panel" style="padding:10px;">
                <div id="chat-box"></div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="chat-input" placeholder="チャット...">
                    <button id="chat-send-btn" class="btn" style="width:60px; padding:5px; font-size:0.8rem; background:var(--main); color:white; height:40px;">送信</button>
                </div>
                <button id="sound-btn" onclick="toggleSnd()" style="width:100%; padding:8px; border-radius:8px; border:none; background:#2ed573; color:white; font-weight:bold; cursor:pointer; margin-top:8px; font-size:0.8rem;">🔊 音: ON</button>
                <button id="rule-btn" onclick="showRules()" style="width:100%; padding:8px; border-radius:8px; border:none; background:#4a90e2; color:white; font-weight:bold; cursor:pointer; margin-top:8px; font-size:0.8rem;">？ ルール説明</button>
            </div>
            <div id="game-items" class="panel" style="padding:10px; display:none;">
                <div id="my-inventory" style="display:flex; flex-direction:column; gap:5px; min-height:100px; justify-content: flex-start;"></div>
            </div>
        </div>

        <div class="main-column">
            <div id="screen-entry" class="screen active panel">
                <h2 style="color:var(--main); margin:0 0 15px 0;">コトバ・サバイバル</h2>
                <input type="text" id="input-name" placeholder="プレイヤー名" value="プレイヤー">
                <input type="text" id="input-room" placeholder="部屋ID" value="123">
                <div class="genre-sel-box" style="font-size:0.9rem;">
                    <b>👑 ホスト設定:</b><br>
                    <label class="genre-option"><input type="radio" name="g-mode" value="vote" checked> 投票</label>
                    <label class="genre-option"><input type="radio" name="g-mode" value="host"> ホスト選択</label>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                    <button id="btn-create" class="btn btn-primary">作成</button>
                    <button id="btn-join" class="btn btn-primary" style="background:var(--sub); box-shadow: 0 4px 0 #26af5d;">参加</button>
                </div>
            </div>

            <div id="screen-lobby" class="screen panel">
                <h3>待機中...</h3>
                <div id="lobby-player-list" style="display:flex; flex-wrap:wrap; justify-content:center; gap:5px; margin-bottom:15px;"></div>
                <div id="color-palette" style="display:flex; justify-content:center; gap:5px; margin-bottom:15px;"></div>
                <div id="vote-area" class="panel" style="background:#f1f2f6; box-shadow:none; padding:10px;">
                    <div id="vote-buttons" style="display:grid; grid-template-columns:1fr 1fr; gap:5px;"></div>
                </div>
                <div class="host-only" style="display:none; margin-top:10px; border-top:1px solid #eee; padding-top:10px;">
                    <button id="btn-add-cpu" class="btn btn-cpu">🤖 CPU追加</button>
                    <div style="margin:10px 0; font-size:0.85rem;">
                        🎈<input type="number" id="input-h" value="17" style="width:40px;"> 
                        除外<input type="number" id="input-exclude" value="10" style="width:40px;">字
                    </div>
                    <button id="btn-start" class="btn btn-host">ゲーム開始！！</button>
                </div>
            </div>

            <div id="screen-game" class="screen panel">
                <div id="display-genre" style="font-size:0.7rem; background:#333; color:white; padding:2px 8px; border-radius:10px; display:inline-block; margin-bottom:5px;"></div>
                <div id="turn-info" style="font-size:1.1rem; font-weight:bold; margin-bottom:10px;">---</div>
                <div id="heart-status" style="font-size:1.4rem; margin-bottom:10px; letter-spacing: -2px;"></div>
                <div id="word-display" style="display:flex; justify-content:center; flex-wrap:wrap; margin-bottom:15px;"></div>
                <div id="progress-list" style="margin-bottom:15px;"></div>
                <div id="keyboard" class="kb-container"></div>
            </div>

            <div id="screen-result" class="screen panel">
                <h2 style="color:var(--main); margin:0;">RESULT</h2>
                <div id="res-word" style="background:#f0f0f0; padding:10px; border-radius:10px; font-size:1.2rem; margin:10px 0;"></div>
                <div id="res-rank"></div>
                <button id="btn-replay" class="btn btn-host host-only" style="display:none; margin-top:10px;">もう一度</button>
                <button onclick="location.reload()" class="btn btn-primary" style="margin-top:5px;">タイトルへ</button>
            </div>
        </div>

        <div class="side-panel" id="side-right" style="display:none;">
            <div class="panel" style="padding:10px;">
                <div class="stamp-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
                    <button class="stamp-btn" onclick="sendStamp('👏')">👏</button>
                    <button class="stamp-btn" onclick="sendStamp('👍')">👍</button>
                    <button class="stamp-btn" onclick="sendStamp('😮')">😮</button>
                    <button class="stamp-btn" onclick="sendStamp('😭')">😭</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, onDisconnect, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { dictionary } from "./questions.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWddxiv4O3gJW2Fyf2gGEwWs5dCiWuu7Y",
            authDomain: "airhockey-1e251.firebaseapp.app",
            projectId: "airhockey-1e251",
            databaseURL: "https://airhockey-1e251-default-rtdb.asia-southeast1.firebasedatabase.app",
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myId, myName, roomKey, isHost = false, currentData = null, lastState = "", cpuThinking = false, thinkingTargetIdx = -1;
        let audioCtx, soundOn = true, lastSndT = 0, lastMsgT = 0, lastStampT = 0;
        const colors = ['#4a90e2', '#2ed573', '#ff4757', '#ffa502', '#9b59b6', '#e84393'];
        const itemInfo = { HEAL: "🎈回復", ATTACK: "💣攻撃", REVEAL: "🔍透視", CLEAN: "🧹掃除" };
        const kanaLayout = ["あ","い","う","え","お","か","き","く","け","こ","さ","し","す","せ","そ","た","ち","つ","て","と","な","に","ぬ","ね","の","は","ひ","ふ","へ","ほ","ま","み","む","め","も","や"," ","ゆ"," ","よ","ら","り","る","れ","ろ","わ","を","ん","ー"," ","が","ぎ","ぐ","げ","ご","ざ","じ","ず","ぜ","ぞ","だ","ぢ","づ","で","ど","ば","び","ぶ","べ","ぼ","ぱ","ぴ","ぷ","ぺ","ぽ","ゃ","ゅ","ょ","っ"," ","ぁ","ぃ","ぅ","ぇ","ぉ","ゔ"];

        window.showRules = () => { alert("【コトバ・サバイバル ルール】\n\n1. 交互に文字を当てよう！\n2. 不正解なら風船(🎈)が減ります。\n3. 風船が0になると「死亡」です。\n4. たまにアイテムが手に入ります。\n5. 全員がクリアか死亡すると終了です。"); };

        function initSnd() { if(soundOn && !audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if(audioCtx?.state === 'suspended') audioCtx.resume(); }
        window.toggleSnd = () => { soundOn = !soundOn; document.getElementById('sound-btn').innerText = soundOn ? "🔊 音: ON" : "🔇 音: OFF"; if(soundOn) initSnd(); };
        function playSnd(type) {
            if(!soundOn || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
            osc.connect(g); g.connect(audioCtx.destination); const now = audioCtx.currentTime;
            if(type === 'ok') { osc.frequency.setValueAtTime(880, now); osc.frequency.exponentialRampToValueAtTime(1760, now+0.1); g.gain.setValueAtTime(0.05, now); }
            else if(type === 'ng') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); g.gain.setValueAtTime(0.05, now); }
            else if(type === 'stamp') { osc.type = 'sine'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(1000, now+0.1); g.gain.setValueAtTime(0.05, now); }
            else { osc.type = 'square'; osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(660, now+0.1); g.gain.setValueAtTime(0.05, now); }
            osc.start(); osc.stop(now+0.2);
        }

        const startEntry = (host) => {
            initSnd(); isHost = host;
            myName = document.getElementById('input-name').value || "名無し";
            roomKey = "room_" + (document.getElementById('input-room').value || "123");
            myId = Math.random().toString(36).slice(2, 7);
            const roomRef = ref(db, `rooms/${roomKey}`);
            if(host) set(roomRef, { status: "lobby", genreMode: "vote", votes: {}, selectedGenre: "オールジャンル", lastMsg: {time:0}, lastSnd: {time:0}, lastStamp: {time:0}, wrongAll: [] });
            set(ref(db, `rooms/${roomKey}/players/${myId}`), { name: myName, color: colors[0], hearts: 17, score: 0, guessed: "", items: [] });
            onDisconnect(ref(db, `rooms/${roomKey}/players/${myId}`)).remove();
            document.getElementById('side-left').style.display = 'block';
            document.getElementById('side-right').style.display = 'block';
            showScreen('screen-lobby');
            if(host) document.querySelectorAll('.host-only').forEach(e => e.style.display = 'block');
            
            const sendChat = () => {
                const el = document.getElementById('chat-input');
                if(el.value.trim()) { push(ref(db, `rooms/${roomKey}/chats`), { name: myName, text: el.value, color: currentData.players[myId].color }); el.value = ''; }
            };
            document.getElementById('chat-input').onkeydown = (e) => { if(e.key === 'Enter') sendChat(); };
            document.getElementById('chat-send-btn').onclick = sendChat;

            onValue(ref(db, `rooms/${roomKey}/chats`), (snap) => {
                const box = document.getElementById('chat-box'); box.innerHTML = '';
                snap.forEach(child => { const c = child.val(); box.innerHTML += `<div><b style="color:${c.color}">${c.name}</b>: ${c.text}</div>`; });
                box.scrollTop = box.scrollHeight;
            });
            onValue(roomRef, (snap) => {
                const data = snap.val(); if(!data) return;
                currentData = data; const pKeys = Object.keys(data.players || {}).sort();
                updatePlayerList(data, pKeys); renderColorPalette(data); renderVotes(data);
                const inv = document.getElementById('my-inventory'); inv.innerHTML = "";
                const myItems = data.players[myId]?.items || [];
                if(myItems.length === 0) { inv.innerHTML = '<div style="font-size:0.7rem; color:#999; padding:15px; text-align:center;">（空っぽ）</div>'; }
                else { myItems.forEach((it, idx) => { const b = document.createElement('button'); b.className = 'btn'; b.style.background = "#ffd32a"; b.style.padding = "5px"; b.style.fontSize="0.7rem"; b.style.height="auto"; b.innerText = itemInfo[it]; b.onclick = () => useItem(myId, it, idx); inv.appendChild(b); }); }
                document.getElementById('game-items').style.display = data.status === "playing" ? "block" : "none";
                if(data.lastSnd?.time > lastSndT) { lastSndT = data.lastSnd.time; playSnd(data.lastSnd.type); }
                if(data.lastMsg?.time > lastMsgT) { lastMsgT = data.lastMsg.time; showT(data.lastMsg.text); }
                if(data.lastStamp?.time > lastStampT) { lastStampT = data.lastStamp.time; showS(data.lastStamp); }
                if(data.status !== lastState) {
                    lastState = data.status;
                    if(data.status === "playing") { initGame(data); updateUI(data, pKeys); checkCPUTurn(data, pKeys); }
                    else if(data.status === "finished") showResult(data, pKeys);
                    else if(data.status === "lobby") showScreen('screen-lobby');
                } else if(data.status === "playing") { updateUI(data, pKeys); checkCPUTurn(data, pKeys); }
            });
        };

        function updatePlayerList(data, pKeys) {
            const list = document.getElementById('lobby-player-list'); list.innerHTML = "";
            pKeys.forEach(k => { const p = data.players[k]; const card = document.createElement('div'); card.className = 'player-card'; card.style.fontSize = "0.8rem"; card.style.padding = "5px 10px"; card.innerHTML = `<span style="color:${p.color}">●</span> ${p.name}`; if(isHost && p.isCPU) { card.onclick = () => remove(ref(db, `rooms/${roomKey}/players/${k}`)); card.style.cursor="pointer"; } list.appendChild(card); });
        }

        function checkCPUTurn(data, pKeys) {
            if(!isHost) return;
            const curIdx = data.turnIdx; const curId = pKeys[curIdx];
            if(cpuThinking && thinkingTargetIdx !== curIdx) cpuThinking = false;
            if(!cpuThinking && data.players[curId]?.isCPU && data.status === "playing") {
                cpuThinking = true; thinkingTargetIdx = curIdx;
                const cpuItems = data.players[curId].items || [];
                const willUseItem = cpuItems.length > 0 && Math.random() < 0.3;
                const doGuess = () => {
                    const latestPKeys = Object.keys(currentData.players).sort();
                    if(currentData.status === "playing" && latestPKeys[currentData.turnIdx] === curId) {
                        const myCorrect = currentData.players[curId].guessed || "";
                        const possible = kanaLayout.filter(c => c !== " " && !currentData.wrongAll?.includes(c) && !myCorrect.includes(c));
                        if(possible.length > 0) handleGuess(curId, possible[Math.floor(Math.random()*possible.length)]);
                    }
                    cpuThinking = false;
                };
                setTimeout(() => { if(willUseItem && currentData.turnIdx === curIdx) { const itemIdx = Math.floor(Math.random() * cpuItems.length); useItem(curId, cpuItems[itemIdx], itemIdx); setTimeout(doGuess, 1200); } else { doGuess(); } }, 1500);
            }
        }

        function renderColorPalette(data) {
            const cp = document.getElementById('color-palette'); cp.innerHTML = ''; const taken = Object.values(data.players).map(p => p.color);
            colors.forEach(c => { 
                const b = document.createElement('div'); const isMine = data.players[myId]?.color === c; const isTaken = taken.includes(c) && !isMine;
                b.style.width = "30px"; b.style.height = "30px"; b.style.borderRadius = "50%"; b.style.background = c; b.style.border = isMine ? "3px solid #333" : "3px solid transparent";
                if(isTaken) { b.style.opacity = "0.15"; b.style.cursor = "not-allowed"; b.innerHTML = "×"; b.style.display="flex"; b.style.alignItems="center"; b.style.justifyContent="center"; b.style.color="white"; b.style.fontSize="20px"; }
                else { b.style.cursor = "pointer"; b.onclick = () => update(ref(db, `rooms/${roomKey}/players/${myId}`), { color: c }); }
                cp.appendChild(b); 
            });
        }

        function renderVotes(data) {
            const container = document.getElementById('vote-buttons'); container.innerHTML = ""; const dictKeys = Object.keys(dictionary); const genres = dictKeys.includes("オールジャンル") ? dictKeys : ["オールジャンル", ...dictKeys];
            genres.forEach(g => { const btn = document.createElement('button'); btn.className = 'btn'; btn.style.padding = "5px"; btn.style.fontSize = "0.7rem"; btn.style.background = "white"; btn.style.color = "#333"; btn.style.height="auto"; const count = Object.values(data.votes || {}).filter(v => v === g).length; btn.innerText = `${g} ${data.genreMode === "vote" ? `(${count})` : ''}`; if(data.genreMode === "vote") { if(data.votes?.[myId] === g) btn.style.border = "2px solid var(--main)"; btn.onclick = () => update(ref(db, `rooms/${roomKey}/votes`), { [myId]: g }); } else if(isHost) { if(data.selectedGenre === g) btn.style.border = "2px solid var(--main)"; btn.onclick = () => update(ref(db, `rooms/${roomKey}`), { selectedGenre: g }); } container.appendChild(btn); });
        }

        function initGame(data) {
            showScreen('screen-game'); document.getElementById('display-genre').innerText = `${data.config.genre} (${data.target.length}字)`;
            const kb = document.getElementById('keyboard'); kb.innerHTML = "";
            kanaLayout.forEach(c => { const k = document.createElement('div'); k.className = 'key'; if(c === " ") { k.style.visibility = "hidden"; } else { k.innerText = c; k.onclick = () => handleGuess(myId, c); } kb.appendChild(k); });
        }

        function handleGuess(pid, char) {
            const pKeys = Object.keys(currentData.players).sort(); if(pKeys[currentData.turnIdx] !== pid) return;
            initSnd(); const data = currentData; const p = data.players[pid]; const updates = {};
            if(Math.random() < 0.15) { const it = Object.keys(itemInfo)[Math.floor(Math.random() * 4)]; updates[`players/${pid}/items`] = [...(p.items || []), it]; updates[`lastMsg`] = { text: `${p.name}が [${itemInfo[it]}] ゲット！`, time: Date.now() }; updates[`lastSnd`] = { type: 'item', time: Date.now() }; }
            if(data.target.includes(char)) { const g = (p.guessed ? p.guessed + "," : "") + char; updates[`players/${pid}/guessed`] = g; updates[`players/${pid}/score`] = g.split(",").length; updates[`lastSnd`] = updates[`lastSnd`] || { type: 'ok', time: Date.now() }; if(data.target.split("").every(c => g.includes(c))) updates[`lastMsg`] = { text: `${p.name} クリア！`, time: Date.now() }; }
            else { const newHearts = (p.hearts || 0) - 1; updates[`players/${pid}/hearts`] = newHearts; const wa = data.wrongAll || []; wa.push(char); updates[`wrongAll`] = wa; updates[`lastSnd`] = updates[`lastSnd`] || { type: 'ng', time: Date.now() }; if(newHearts <= 0) updates[`lastMsg`] = { text: `${p.name} 死亡...`, time: Date.now() }; else updates[`lastMsg`] = { text: `「${char}」なし！`, time: Date.now() }; }
            const latest = JSON.parse(JSON.stringify(data.players)); Object.keys(updates).forEach(k => { if(k.startsWith("players/")) { const [_, id, key] = k.split("/"); latest[id][key] = updates[k]; } });
            const activePlayers = pKeys.filter(id => { const checkP = latest[id]; const isCompleted = data.target.split("").every(c => (checkP.guessed || "").includes(c)); return checkP.hearts > 0 && !isCompleted; });
            const isGameOver = (pKeys.length > 1) ? (activePlayers.length <= 1) : (activePlayers.length === 0);
            let nextTurnIdx = (data.turnIdx + 1) % pKeys.length; if(!isGameOver) { for(let i=0; i<pKeys.length; i++) { if (activePlayers.includes(pKeys[nextTurnIdx])) break; nextTurnIdx = (nextTurnIdx + 1) % pKeys.length; } }
            updates[`turnIdx`] = nextTurnIdx; update(ref(db, `rooms/${roomKey}`), updates); if(isGameOver) setTimeout(() => update(ref(db, `rooms/${roomKey}`), { status: "finished" }), 800);
        }

        function useItem(pid, type, idx) {
            initSnd(); const data = currentData; const pKeys = Object.keys(data.players).sort(); const p = data.players[pid]; const items = [...(p.items || [])]; items.splice(idx, 1); const up = { [`players/${pid}/items`]: items, lastSnd: {type:'item', time:Date.now()}, lastMsg: {text:`${p.name}が [${itemInfo[type]}] 使用！`, time:Date.now()} };
            if(type === "HEAL") up[`players/${pid}/hearts`] = (p.hearts || 0) + 5;
            else if(type === "ATTACK") { pKeys.forEach(id => { if(id !== pid) { const oldH = data.players[id].hearts || 0; const newH = Math.max(0, oldH - 3); up[`players/${id}/hearts`] = newH; if(oldH > 0 && newH <= 0) up[`lastMsg`] = { text: `${data.players[id].name} 死亡！`, time: Date.now() }; }}); }
            else if(type === "REVEAL") { const h = data.target.split("").filter(c => !(p.guessed || "").includes(c)); if(h.length > 0) { const c = h[Math.floor(Math.random()*h.length)]; const g = (p.guessed ? p.guessed + "," : "") + c; up[`players/${pid}/guessed`] = g; up[`players/${pid}/score`] = g.split(",").length; if(data.target.split("").every(char => g.includes(char))) up[`lastMsg`] = { text: `${p.name} クリア！`, time: Date.now() }; } }
            else if(type === "CLEAN") { const wa = data.wrongAll || []; const targetChars = data.target.split(""); const possible = kanaLayout.filter(c => c !== " " && !targetChars.includes(c) && !wa.includes(c)); const newWa = [...wa]; for(let i=0; i<10 && possible.length>0; i++) { const rnd = Math.floor(Math.random() * possible.length); newWa.push(possible.splice(rnd, 1)[0]); } up[`wrongAll`] = newWa; }
            const latest = JSON.parse(JSON.stringify(data.players)); Object.keys(up).forEach(k => { if(k.startsWith("players/")) { const parts = k.split("/"); latest[parts[1]][parts[2]] = up[k]; } });
            const activePlayers = pKeys.filter(id => { const checkP = latest[id]; const isCompleted = data.target.split("").every(c => (checkP.guessed || "").includes(c)); return checkP.hearts > 0 && !isCompleted; });
            const isGameOver = (pKeys.length > 1) ? (activePlayers.length <= 1) : (activePlayers.length === 0);
            if (!activePlayers.includes(pid) && !isGameOver) { let nextTurnIdx = (data.turnIdx + 1) % pKeys.length; for(let i=0; i<pKeys.length; i++) { if (activePlayers.includes(pKeys[nextTurnIdx])) break; nextTurnIdx = (nextTurnIdx + 1) % pKeys.length; } up[`turnIdx`] = nextTurnIdx; }
            update(ref(db, `rooms/${roomKey}`), up); if(isGameOver) setTimeout(() => update(ref(db, `rooms/${roomKey}`), { status: "finished" }), 800);
        }

        function updateUI(data, pKeys) {
            const myActualP = data.players[myId]; const amICompleted = data.target.split("").every(c => (myActualP.guessed || "").includes(c)); const isSpectating = (myActualP.hearts <= 0 || amICompleted); const curId = pKeys[data.turnIdx]; const isMyTurn = (curId === myId && !isSpectating); const displayP = isSpectating ? (data.players[curId] || myActualP) : myActualP;
            document.getElementById('heart-status').innerText = "🎈".repeat(Math.max(0, displayP.hearts || 0));
            const wDisp = document.getElementById('word-display'); wDisp.innerHTML = ""; data.target.split("").forEach(c => { const s = document.createElement('div'); s.className = 'word-slot'; s.innerText = (displayP.guessed || "").includes(c) ? c : ""; wDisp.appendChild(s); });
            let turnText = isMyTurn ? "★ あなたの番 ★" : `${data.players[curId]?.name}の番...`;
            if (isSpectating && data.players[curId] && data.status === "playing") turnText = `👁️ ${data.players[curId].name} 観戦中`;
            document.getElementById('turn-info').innerText = turnText; document.getElementById('turn-info').style.color = data.players[curId]?.color || '#333';
            const kb = document.getElementById('keyboard'); kb.className = isMyTurn ? 'kb-container' : 'kb-container kb-disabled';
            const displayGuessedChars = displayP.guessed || ""; document.querySelectorAll('.key').forEach(k => { k.className = 'key'; if(data.wrongAll?.includes(k.innerText)) k.classList.add('wrong'); if(displayGuessedChars.includes(k.innerText)) k.classList.add('correct'); });
            const prog = document.getElementById('progress-list'); prog.innerHTML = "";
            pKeys.forEach(id => { const pl = data.players[id]; const item = document.createElement('div'); item.className = 'progress-item'; item.style.borderLeftColor = pl.color; const isAlive = (pl.hearts || 0) > 0; const statusBadge = `<span class="status-badge ${isAlive ? 'alive' : 'dead'}">${isAlive ? '生存' : '死亡'}</span>`; const visual = data.target.split("").map(c => (pl.guessed||"").includes(c) ? "●" : "○").join(""); item.innerHTML = `<b>${pl.name}</b> 🎈${pl.hearts}${statusBadge}<span style="letter-spacing:1px; margin-left:5px;">${visual}</span>`; prog.appendChild(item); });
        }

        function showResult(data, pKeys) {
            showScreen('screen-result'); document.getElementById('res-word').innerText = "正解: " + data.target; const r = document.getElementById('res-rank'); r.innerHTML = "";
            pKeys.map(k => data.players[k]).sort((a, b) => { const aAlive = (a.hearts || 0) > 0; const bAlive = (b.hearts || 0) > 0; if (aAlive && !bAlive) return -1; if (!aAlive && bAlive) return 1; return b.score - a.score; }).forEach((p,i) => { const statusStr = p.hearts > 0 ? "🎈生存" : "💀脱落"; r.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee; background:white; border-radius:10px; margin-bottom:5px; text-align:left; font-size:0.85rem;"><b style="color:${p.color}">${i+1}位: ${p.name}</b> (${p.score}点) ${statusStr}</div>`; });
        }

        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function showT(m) { const t=document.getElementById('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }
        window.sendStamp = (emoji) => { initSnd(); update(ref(db, `rooms/${roomKey}`), { lastStamp: { emoji, sender: myName, time: Date.now() }, lastSnd: { type: 'stamp', time: Date.now() } }); };
        
        function showS(s) {
            const container = document.getElementById('stamp-container'); const div = document.createElement('div'); div.className = 'floating-stamp'; div.innerText = `${s.sender}: ${s.emoji}`;
            // 中央寄り（40%〜60%）に出現
            const randX = Math.floor(Math.random() * 21) + 40; 
            const randY = Math.floor(Math.random() * 21) + 30;
            div.style.left = randX + "%"; div.style.top = randY + "%"; container.appendChild(div);
            // 1.5秒後に小さくなって消える
            setTimeout(() => { 
                div.classList.add('shrink');
                setTimeout(() => div.remove(), 300); 
            }, 1500);
        }

        document.getElementById('btn-create').onclick = () => startEntry(true);
        document.getElementById('btn-join').onclick = () => startEntry(false);
        document.getElementById('btn-add-cpu').onclick = () => { const id = "cpu_" + Math.random().toString(36).slice(2, 7); const taken = Object.values(currentData.players).map(p => p.color); update(ref(db, `rooms/${roomKey}/players/${id}`), { name: "🤖 CPU", color: colors.find(c => !taken.includes(c)) || colors[0], hearts: 17, score: 0, guessed: "", items: [], isCPU: true }); };
        document.getElementById('btn-replay').onclick = () => { const resetData = { status: "lobby", votes: {}, wrongAll: [], lastMsg: {text: "準備完了！", time: Date.now()} }; Object.keys(currentData.players).forEach(pid => { resetData[`players/${pid}/guessed`] = ""; resetData[`players/${pid}/score`] = 0; resetData[`players/${pid}/items`] = []; }); update(ref(db, `rooms/${roomKey}`), resetData); };
        document.getElementById('btn-start').onclick = () => {
            let g = currentData.selectedGenre || "オールジャンル"; if(currentData.genreMode === "vote") { const v = Object.values(currentData.votes || {}); if(v.length > 0) g = v[Math.floor(Math.random() * v.length)]; }
            const pool = (g === "オールジャンル") ? Object.values(dictionary).flat() : dictionary[g]; const target = pool[Math.floor(Math.random() * pool.length)]; const h = parseInt(document.getElementById('input-h').value);
            const excludeCount = parseInt(document.getElementById('input-exclude').value) || 0; const targetChars = target.split(""); const possibleExcludes = kanaLayout.filter(c => c !== " " && !targetChars.includes(c)); const initialWrong = []; for(let i=0; i<excludeCount && possibleExcludes.length > 0; i++) { const idx = Math.floor(Math.random() * possibleExcludes.length); initialWrong.push(possibleExcludes.splice(idx, 1)[0]); }
            const up = { status: "playing", target, turnIdx: 0, config: {genre: g, h}, wrongAll: initialWrong, lastMsg: {text:"スタート！", time:Date.now()} }; Object.keys(currentData.players).forEach(k => { up[`players/${k}/score`] = 0; up[`players/${k}/guessed`] = ""; up[`players/${k}/hearts`] = h; up[`players/${k}/items`] = []; }); update(ref(db, `rooms/${roomKey}`), up);
        };
    </script>
