<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>コトバ・サバイバル v37</title>
    <style>
        :root { --main: #4a90e2; --sub: #2ed573; --danger: #ff4757; --bg: #f4f7f9; }
        body { background: var(--bg); font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; text-align: center; color: #333; overflow-x: hidden; }
        
        .game-wrapper { display: flex; justify-content: center; align-items: flex-start; gap: 15px; padding: 10px; max-width: 1100px; margin: 0 auto; }
        .main-column { flex: 1; max-width: 500px; min-width: 320px; }
        .side-panel { width: 220px; flex-shrink: 0; margin-top: 15px; position: sticky; top: 15px; }

        .panel { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); box-sizing: border-box; margin-bottom: 15px; position: relative; }
        .screen { display: none; }
        .active { display: block; }
        
        .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; width: 100%; box-sizing: border-box; }
        .btn-primary { background: var(--main); color: white; }
        .btn-host { background: orange; color: white; margin-top: 10px; }
        .btn-cpu { background: #8e44ad; color: white; margin-top: 10px; font-size: 0.8rem; padding: 8px; }

        /* プレイヤーリストのスタイル */
        .player-card-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 15px 0; }
        .player-card { padding: 5px 12px; border-radius: 15px; background: #eee; font-size: 0.85rem; font-weight: bold; display: flex; align-items: center; gap: 5px; }

        .vote-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .vote-btn { background: white; border: 2px solid #eee; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        .vote-btn.selected { border-color: var(--main); background: #eef2ff; }

        .color-btn { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.2s; }
        .color-btn.active { border-color: #333; transform: scale(1.1); }
        .color-btn.taken { opacity: 0.2; cursor: not-allowed; border-color: transparent !important; }

        #heart-status { font-size: 1.8rem; margin-bottom: 10px; letter-spacing: 2px; }
        .word-slot { width: 30px; height: 40px; border-bottom: 3px solid #ccc; margin: 4px; font-size: 1.5rem; font-weight: bold; display: flex; align-items: center; justify-content: center; }

        .kb-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; background: #e2e8f0; padding: 8px; border-radius: 12px; }
        .key { aspect-ratio: 1; background: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; box-shadow: 0 2px 0 #cbd5e0; font-size: 0.9rem; }
        .key.correct { background: var(--sub); color: white; box-shadow: none; }
        .key.wrong { background: var(--danger); color: white; box-shadow: none; }

        #chat-box { height: 250px; overflow-y: auto; text-align: left; font-size: 0.85rem; background: #f8f9fa; border-radius: 10px; padding: 10px; margin-bottom: 8px; border: 1px solid #eee; }
        .stamp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stamp-btn { font-size: 1.5rem; height: 60px; cursor: pointer; border: none; background: #f0f0f0; border-radius: 12px; }

        .item-inventory { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .item-use-btn { background: #ffd32a; border: none; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; box-shadow: 0 3px 0 #d4a017; font-size: 0.8rem; }
        
        #toast { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0); background: rgba(0,0,0,0.85); color: white; padding: 15px 25px; border-radius: 15px; z-index: 9999; transition: 0.3s; pointer-events: none; font-weight: bold; }
        #stamp-pop { position: fixed; top: 20%; left: 50%; transform: translate(-50%, -50%) scale(0); background: white; padding: 10px 20px; border-radius: 30px; border: 3px solid var(--main); z-index: 999; transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); font-weight: bold; }
        #toast.show, #stamp-pop.show { transform: translate(-50%, -50%) scale(1); }

        @media (max-width: 900px) { .game-wrapper { flex-direction: column; align-items: center; } .side-panel { width: 100%; max-width: 500px; position: static; } }
    </style>
</head>
<body>

    <div id="toast"></div>
    <div id="stamp-pop"></div>

    <div class="game-wrapper">
        <div class="side-panel" id="side-left" style="display:none;">
            <div class="panel" style="padding:15px;">
                <div id="chat-box"></div>
                <input type="text" id="chat-input" placeholder="チャット...">
                <button id="sound-btn" onclick="toggleSnd()" style="width:100%; padding:8px; border-radius:10px; border:none; background:#2ed573; color:white; font-weight:bold; cursor:pointer; margin-top:10px;">🔊 音: ON</button>
            </div>
        </div>

        <div class="main-column">
            <div id="screen-entry" class="screen active panel">
                <h1 style="color:var(--main); margin:0 0 15px;">コトバ・サバイバル</h1>
                <input type="text" id="input-name" placeholder="なまえ" value="プレイヤー">
                <input type="text" id="input-room" placeholder="部屋ID" value="123">
                <div style="background:#f8f9fa; padding:10px; border-radius:10px; margin-bottom:15px; text-align:left; font-size:0.8rem;">
                    <b>👑 ホスト設定:</b><br>
                    <label><input type="radio" name="g-mode" value="vote" checked> 投票モード</label><br>
                    <label><input type="radio" name="g-mode" value="host"> ホスト選択モード</label>
                </div>
                <div style="display:flex; gap:10px;">
                    <button id="btn-create" class="btn btn-primary">作る</button>
                    <button id="btn-join" class="btn btn-primary" style="background:var(--sub)">入る</button>
                </div>
            </div>

            <div id="screen-lobby" class="screen panel">
                <h2 style="margin:0;">ロビー</h2>
                <div id="lobby-player-list" class="player-card-list"></div>
                <div id="color-palette" style="display:flex; justify-content:center; gap:8px; margin:15px 0;"></div>
                <div id="vote-area">
                    <div id="vote-msg" style="font-size:0.85rem; font-weight:bold; margin-bottom:5px;"></div>
                    <div id="vote-buttons" class="vote-list"></div>
                </div>
                <div class="host-only" style="display:none; margin-top:20px; border-top:1px solid #eee; padding-top:15px;">
                    <button id="btn-add-cpu" class="btn btn-cpu">🤖 CPUを追加</button><br>
                    風船: <input type="number" id="input-h" value="17" style="width:60px; margin-top:10px;"> 🎈
                    <button id="btn-start" class="btn btn-host">開始！</button>
                </div>
            </div>

            <div id="screen-game" class="screen panel">
                <div id="display-genre" style="position:absolute; top:10px; left:15px; font-size:0.7rem; background:#333; color:white; padding:2px 8px; border-radius:10px;"></div>
                <div id="turn-info" style="font-weight:bold; margin-bottom:10px;">---</div>
                <div id="heart-status"></div>
                <div id="word-display" style="display:flex; justify-content:center; flex-wrap:wrap; margin-bottom:20px;"></div>
                <div id="progress-list" style="margin-bottom:15px; text-align:left;"></div>
                <div id="keyboard" class="kb-container"></div>
            </div>

            <div id="screen-result" class="screen panel">
                <h1>RESULT</h1>
                <h2 id="res-word" style="background:#f0f0f0; padding:10px; border-radius:10px;"></h2>
                <div id="res-rank" style="text-align:left; margin:15px 0;"></div>
                <button id="btn-replay" class="btn btn-host host-only" style="display:none; margin-bottom:10px;">もう一度遊ぶ</button>
                <button onclick="location.reload()" class="btn btn-primary">タイトルへ</button>
            </div>
        </div>

        <div class="side-panel" id="side-right" style="display:none;">
            <div class="panel" style="padding:10px; margin-bottom:10px;">
                <div class="stamp-grid">
                    <button class="stamp-btn" onclick="sendStamp('👏')">👏</button>
                    <button class="stamp-btn" onclick="sendStamp('👍')">👍</button>
                    <button class="stamp-btn" onclick="sendStamp('😮')">😮</button>
                    <button class="stamp-btn" onclick="sendStamp('😭')">😭</button>
                </div>
            </div>
            <div id="game-items" class="panel" style="padding:10px; display:none;">
                <div id="my-inventory" class="item-inventory"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, onDisconnect, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { dictionary } from "./questions.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWddxiv4O3gJW2Fyf2gGEwWs5dCiWuu7Y",
            authDomain: "airhockey-1e251.firebaseapp.app",
            projectId: "airhockey-1e251",
            databaseURL: "https://airhockey-1e251-default-rtdb.asia-southeast1.firebasedatabase.app",
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myId, myName, roomKey, isHost = false, currentData = null, lastState = "", cpuThinking = false;
        let audioCtx, soundOn = true, lastSndT = 0, lastMsgT = 0, lastStampT = 0;
        const colors = ['#4a90e2', '#2ed573', '#ff4757', '#ffa502', '#9b59b6', '#e84393'];
        const itemInfo = {
            HEAL: { name: "🎈回復" }, ATTACK: { name: "💣攻撃" }, REVEAL: { name: "🔍透視" }, CLEAN: { name: "🧹掃除" }
        };
        const kana = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをんーがぎぐげござじずぜぞだぢづでどばびぶべぼぱぴぷぺぽゃゅょっぁぃぅぇぉゔ";

        function initSnd() {
            if(soundOn && !audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx?.state === 'suspended') audioCtx.resume();
        }

        window.toggleSnd = () => {
            soundOn = !soundOn;
            document.getElementById('sound-btn').innerText = soundOn ? "🔊 音: ON" : "🔇 音: OFF";
            if(soundOn) initSnd();
        };

        function playSnd(type) {
            if(!soundOn || !audioCtx) return;
            const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
            osc.connect(g); g.connect(audioCtx.destination); const now = audioCtx.currentTime;
            if(type === 'ok') { osc.frequency.setValueAtTime(880, now); osc.frequency.exponentialRampToValueAtTime(1760, now+0.1); g.gain.setValueAtTime(0.05, now); }
            else if(type === 'ng') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); g.gain.setValueAtTime(0.05, now); }
            else if(type === 'stamp') { osc.type = 'sine'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(1000, now+0.1); g.gain.setValueAtTime(0.05, now); }
            else { osc.type = 'square'; osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(660, now+0.1); g.gain.setValueAtTime(0.05, now); }
            osc.start(); osc.stop(now+0.2);
        }

        const startEntry = (host) => {
            initSnd(); isHost = host;
            myName = document.getElementById('input-name').value || "名無し";
            roomKey = "room_" + (document.getElementById('input-room').value || "123");
            myId = Math.random().toString(36).slice(2, 7);

            const roomRef = ref(db, `rooms/${roomKey}`);
            if(host) {
                set(roomRef, {
                    status: "lobby", genreMode: document.querySelector('input[name="g-mode"]:checked').value,
                    votes: {}, selectedGenre: "オールジャンル", lastMsg: {time:0}, lastSnd: {time:0}, lastStamp: {time:0}
                });
            }

            set(ref(db, `rooms/${roomKey}/players/${myId}`), {
                name: myName, color: colors[0], hearts: 17, score: 0, guessed: "", items: []
            });
            onDisconnect(ref(db, `rooms/${roomKey}/players/${myId}`)).remove();

            document.getElementById('side-left').style.display = 'block';
            document.getElementById('side-right').style.display = 'block';
            showScreen('screen-lobby');
            if(host) document.querySelectorAll('.host-only').forEach(e => e.style.display = 'block');

            document.getElementById('chat-input').onkeydown = (e) => {
                if(e.key === 'Enter' && e.target.value.trim()) {
                    push(ref(db, `rooms/${roomKey}/chats`), { name: myName, text: e.target.value, color: currentData.players[myId].color });
                    e.target.value = '';
                }
            };

            onValue(ref(db, `rooms/${roomKey}/chats`), (snap) => {
                const box = document.getElementById('chat-box'); box.innerHTML = '';
                snap.forEach(child => {
                    const c = child.val(); box.innerHTML += `<div><b style="color:${c.color}">${c.name}</b>: ${c.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });

            onValue(roomRef, (snap) => {
                const data = snap.val(); if(!data) return;
                currentData = data;
                const pKeys = Object.keys(data.players || {}).sort();

                updatePlayerList(data, pKeys);
                renderColorPalette(data);
                renderVotes(data);

                const inv = document.getElementById('my-inventory'); inv.innerHTML = "";
                (data.players[myId]?.items || []).forEach((it, idx) => {
                    const b = document.createElement('button'); b.className = 'item-use-btn';
                    b.innerText = itemInfo[it].name; b.onclick = () => useItem(it, idx); inv.appendChild(b);
                });
                document.getElementById('game-items').style.display = data.status === "playing" ? "block" : "none";

                if(data.lastSnd?.time > lastSndT) { lastSndT = data.lastSnd.time; playSnd(data.lastSnd.type); }
                if(data.lastMsg?.time > lastMsgT) { lastMsgT = data.lastMsg.time; showT(data.lastMsg.text); }
                if(data.lastStamp?.time > lastStampT) { lastStampT = data.lastStamp.time; showS(data.lastStamp); }

                if(data.status !== lastState) {
                    lastState = data.status;
                    if(data.status === "playing") initGame(data);
                    else if(data.status === "finished") showResult(data, pKeys);
                    else if(data.status === "lobby") showScreen('screen-lobby');
                } else if(data.status === "playing") {
                    updateUI(data);
                    checkCPUTurn(data, pKeys);
                }
            });
        };

        function updatePlayerList(data, pKeys) {
            const list = document.getElementById('lobby-player-list'); list.innerHTML = "";
            pKeys.forEach(k => {
                const p = data.players[k];
                const card = document.createElement('div'); card.className = 'player-card';
                card.innerHTML = `<span style="color:${p.color}">●</span> ${p.name}`;
                if(isHost && p.isCPU) {
                    card.style.cursor = "pointer"; card.title = "削除";
                    card.onclick = () => remove(ref(db, `rooms/${roomKey}/players/${k}`));
                }
                list.appendChild(card);
            });
        }

        function checkCPUTurn(data, pKeys) {
            if(!isHost || cpuThinking) return;
            const curPId = pKeys[data.turnIdx];
            const curP = data.players[curPId];
            if(curP?.isCPU) {
                cpuThinking = true;
                setTimeout(() => {
                    const possible = kana.split("").filter(c => !data.wrongAll?.includes(c) && !(curP.guessed||"").includes(c));
                    const char = possible[Math.floor(Math.random()*possible.length)];
                    handleGuess(curPId, char);
                    cpuThinking = false;
                }, 1500);
            }
        }

        function addCPU() {
            const id = "cpu_" + Math.random().toString(36).slice(2, 7);
            const taken = Object.values(currentData.players).map(p => p.color);
            const color = colors.find(c => !taken.includes(c)) || colors[Math.floor(Math.random()*colors.length)];
            update(ref(db, `rooms/${roomKey}/players/${id}`), {
                name: "🤖 CPU " + (Object.keys(currentData.players).filter(k=>k.startsWith('cpu')).length + 1),
                color: color, hearts: 17, score: 0, guessed: "", items: [], isCPU: true
            });
        }

        function renderColorPalette(data) {
            const cp = document.getElementById('color-palette'); cp.innerHTML = '';
            const taken = Object.values(data.players).map(p => p.color);
            colors.forEach(c => {
                const b = document.createElement('div');
                const isMine = data.players[myId]?.color === c;
                b.className = `color-btn ${isMine ? 'active' : ''} ${taken.includes(c) && !isMine ? 'taken' : ''}`;
                b.style.background = c;
                if(!taken.includes(c) || isMine) b.onclick = () => update(ref(db, `rooms/${roomKey}/players/${myId}`), { color: c });
                cp.appendChild(b);
            });
        }

        function renderVotes(data) {
            const container = document.getElementById('vote-buttons'); container.innerHTML = "";
            const genres = ["オールジャンル", ...Object.keys(dictionary)];
            const isVoteMode = data.genreMode === "vote";
            document.getElementById('vote-msg').innerText = isVoteMode ? "🎨 ジャンル投票" : "👑 ホスト選択";
            genres.forEach(g => {
                const btn = document.createElement('div'); btn.className = 'vote-btn';
                const count = Object.values(data.votes || {}).filter(v => v === g).length;
                btn.innerHTML = `${g} ${isVoteMode ? `<span>(${count})</span>` : ''}`;
                if(isVoteMode) {
                    if(data.votes?.[myId] === g) btn.classList.add('selected');
                    btn.onclick = () => update(ref(db, `rooms/${roomKey}/votes`), { [myId]: g });
                } else {
                    if(data.selectedGenre === g) btn.classList.add('selected');
                    if(isHost) btn.onclick = () => update(ref(db, `rooms/${roomKey}`), { selectedGenre: g });
                }
                container.appendChild(btn);
            });
        }

        function initGame(data) {
            showScreen('screen-game');
            document.getElementById('display-genre').innerText = data.config.genre;
            const kb = document.getElementById('keyboard'); kb.innerHTML = "";
            kana.split("").forEach(c => {
                const k = document.createElement('div'); k.className = 'key'; k.id = "k-"+c; k.innerText = c;
                k.onclick = () => { if(Object.keys(currentData.players).sort()[currentData.turnIdx] === myId) handleGuess(myId, c); };
                kb.appendChild(k);
            });
        }

        function handleGuess(pid, char) {
            initSnd(); const data = currentData; const p = data.players[pid]; const updates = {};
            if(Math.random() < 0.15 && !p.isCPU) {
                const it = Object.keys(itemInfo)[Math.floor(Math.random() * 4)];
                updates[`players/${pid}/items`] = [...(p.items || []), it];
                updates[`lastMsg`] = { text: `${p.name}が [${itemInfo[it].name}] をゲット！`, time: Date.now() };
                updates[`lastSnd`] = { type: 'item', time: Date.now() };
            }
            if(data.target.includes(char)) {
                const g = (p.guessed ? p.guessed + "," : "") + char;
                updates[`players/${pid}/guessed`] = g; updates[`players/${pid}/score`] = g.split(",").length;
                if(!updates[`lastSnd`]) updates[`lastSnd`] = { type: 'ok', time: Date.now() };
            } else {
                updates[`players/${pid}/hearts`] = (p.hearts || 0) - 1;
                const wa = data.wrongAll || []; wa.push(char); updates[`wrongAll`] = wa;
                updates[`lastMsg`] = { text: `「${char}」ではありません！`, time: Date.now() };
                if(!updates[`lastSnd`]) updates[`lastSnd`] = { type: 'ng', time: Date.now() };
            }
            updates[`turnIdx`] = (data.turnIdx + 1) % Object.keys(data.players).length;
            update(ref(db, `rooms/${roomKey}`), updates);
            const latest = {...data.players};
            if(updates[`players/${pid}/guessed`]) latest[pid].guessed = updates[`players/${pid}/guessed`];
            if(data.target.split("").every(c => Object.values(latest).some(pl => (pl.guessed || "").includes(c))) || (p.hearts - (updates[`players/${pid}/hearts`]!==undefined?1:0)) <= 0) {
                setTimeout(() => update(ref(db, `rooms/${roomKey}`), { status: "finished" }), 800);
            }
        }

        function useItem(type, idx) {
            initSnd(); const p = currentData.players[myId]; const items = [...p.items]; items.splice(idx, 1);
            const up = { [`players/${myId}/items`]: items, lastSnd: {type:'item', time:Date.now()}, lastMsg: {text:`${p.name}が [${itemInfo[type].name}] を使用！`, time:Date.now()} };
            if(type === "HEAL") up[`players/${myId}/hearts`] = (p.hearts || 0) + 5;
            else if(type === "ATTACK") Object.keys(currentData.players).forEach(id => { if(id !== myId) up[`players/${id}/hearts`] = Math.max(0, (currentData.players[id].hearts || 0) - 3); });
            else if(type === "REVEAL") {
                const h = currentData.target.split("").filter(c => !(p.guessed || "").includes(c));
                if(h.length > 0) { const c = h[Math.floor(Math.random()*h.length)]; up[`players/${myId}/guessed`] = (p.guessed ? p.guessed + "," : "") + c; up[`players/${myId}/score`] = up[`players/${myId}/guessed`].split(",").length; }
            } else if(type === "CLEAN") { const wa = currentData.wrongAll || []; up[`wrongAll`] = wa.slice(0, Math.max(0, wa.length - 10)); }
            update(ref(db, `rooms/${roomKey}`), up);
        }

        function updateUI(data) {
            const myP = data.players[myId]; document.getElementById('heart-status').innerText = "🎈".repeat(Math.max(0, myP.hearts || 0));
            const wDisp = document.getElementById('word-display'); wDisp.innerHTML = "";
            data.target.split("").forEach(c => {
                const s = document.createElement('div'); s.className = 'word-slot'; s.innerText = (myP.guessed || "").includes(c) ? c : ""; wDisp.appendChild(s);
            });
            const pKeys = Object.keys(data.players).sort(); const curP = data.players[pKeys[data.turnIdx]];
            document.getElementById('turn-info').innerText = (curP?.name === myName) ? "★ あなたの番 ★" : `${curP?.name}の番...`;
            document.getElementById('turn-info').style.color = curP?.color;
            document.querySelectorAll('.key').forEach(k => {
                k.className = 'key'; if(data.wrongAll?.includes(k.innerText)) k.classList.add('wrong'); if(myP.guessed?.includes(k.innerText)) k.classList.add('correct');
            });
            const prog = document.getElementById('progress-list'); prog.innerHTML = "";
            pKeys.forEach(id => { const pl = data.players[id]; prog.innerHTML += `<div style="font-size:0.75rem;"><b style="color:${pl.color}">${pl.name}</b> 🎈${pl.hearts} [${data.target.split("").map(c => (pl.guessed||"").includes(c)?"●":"○").join("")}]</div>`; });
        }

        function showResult(data, pKeys) {
            showScreen('screen-result'); document.getElementById('res-word').innerText = "正解: " + data.target;
            const r = document.getElementById('res-rank'); r.innerHTML = "";
            pKeys.map(k => data.players[k]).sort((a,b)=>b.score-a.score).forEach((p,i) => {
                r.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee; background:white; border-radius:10px; margin-bottom:5px;"><b style="color:${p.color}">${i+1}位: ${p.name}</b> (${p.score}点) 🎈:${p.hearts}<br><span style="font-size:0.7rem; color:#666;">文字: ${p.guessed ? p.guessed.split(",").join(" ") : "-"}</span></div>`;
            });
        }

        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function showT(m) { const t=document.getElementById('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2000); }
        window.sendStamp = (emoji) => { initSnd(); update(ref(db, `rooms/${roomKey}`), { lastStamp: { emoji, sender: myName, time: Date.now() }, lastSnd: { type: 'stamp', time: Date.now() } }); };
        function showS(s) { const p=document.getElementById('stamp-pop'); p.innerText=`${s.sender}: ${s.emoji}`; p.classList.add('show'); setTimeout(()=>p.classList.remove('show'), 1500); }

        document.getElementById('btn-create').onclick = () => startEntry(true);
        document.getElementById('btn-join').onclick = () => startEntry(false);
        document.getElementById('btn-add-cpu').onclick = () => addCPU();
        document.getElementById('btn-replay').onclick = () => update(ref(db, `rooms/${roomKey}`), { status: "lobby", votes: {} });
        document.getElementById('btn-start').onclick = () => {
            let g = currentData.selectedGenre || "オールジャンル";
            if(currentData.genreMode === "vote") { const v = Object.values(currentData.votes || {}); if(v.length > 0) g = v[Math.floor(Math.random() * v.length)]; }
            const pool = (g === "オールジャンル") ? Object.values(dictionary).flat() : dictionary[g];
            const target = pool[Math.floor(Math.random() * pool.length)]; const h = parseInt(document.getElementById('input-h').value);
            const up = { status: "playing", target, turnIdx: 0, config: {genre: g, h}, wrongAll: [] };
            Object.keys(currentData.players).forEach(k => { up[`players/${k}/score`] = 0; up[`players/${k}/guessed`] = ""; up[`players/${k}/hearts`] = h; up[`players/${k}/items`] = []; });
            update(ref(db, `rooms/${roomKey}`), up);
        };
    </script>
</body>
</html>
